<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>2026 - DuGiaVan</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@700;900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --accent-gold: #f1c40f;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(-45deg, #4a148c, #880e4f, #1a1a2e, #0d0d2b, #1a2a6c, #b21f1f, #fdbb2d, #1a2a6c);
            background-size: 600% 600%;
            animation: gradientBG 20s ease infinite;

            /* SỬA 2 DÒNG DƯỚI ĐÂY */
            min-height: 100vh;
            /* Thay height thành min-height để nó tự dài ra theo nội dung */
            overflow-x: hidden;
            /* Chỉ cấm cuộn ngang */
            overflow-y: auto;
            /* Cho phép cuộn dọc khi nội dung dài */

            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        @keyframes gradientBG {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        #stars-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .content-wrapper {
            text-align: center;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        /* Style cho số nhảy và chữ */
        .journey-text {
            font-size: 1.2rem;
            color: var(--accent-gold);
            letter-spacing: 2px;
            opacity: 0.8;
            margin-bottom: -10px;
        }

        .center-number {
            font-weight: 900;
            font-size: clamp(5rem, 20vw, 12rem);
            color: var(--accent-gold);
            user-select: none;
            letter-spacing: -2px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .morph-container {
            display: inline-block;
            height: 1em;
            overflow: hidden;
            position: relative;
            padding-right: 25px;
            margin-left: -5px;
        }

        .morph-list {
            display: flex;
            flex-direction: column;
            transition: transform 6s cubic-bezier(0.65, 0, 0.35, 1);
        }

        .morph-list.active {
            transform: translateY(-50%);
        }

        .digit {
            height: 1em;
            line-height: 1em;
            text-align: left;
            padding-left: 5px;
        }

        /* 1. Phần mô tả phụ (Tự động co giãn) */
        .sub-description {
            font-family: 'Montserrat', sans-serif;
            font-weight: 300;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 20px;
            font-size: clamp(0.6rem, 2vw, 0.8rem);
            letter-spacing: clamp(2px, 1vw, 5px);
            padding: 0 15px;
            max-width: 90vw;
            line-height: 1.6;
            text-align: center;
        }

        /* 2. Menu Điều hướng (Tự căn chỉnh theo màn hình) */
        nav {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        /* Style chung cho nút trong Menu */
        nav a {
            color: var(--accent-gold);
            text-decoration: none;
            font-weight: bold;
            border: 1px solid rgba(241, 196, 15, 0.4);
            padding: 8px 18px;
            border-radius: 20px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(5px);
            transition: 0.3s;
            font-size: 0.85rem;
        }

        nav a:hover {
            background: var(--accent-gold);
            color: #1a1a2e;
            box-shadow: 0 0 15px var(--accent-gold);
            transform: translateY(-2px);
        }

        /* 3. ĐẶC BIỆT: Tối ưu riêng cho Điện thoại (Android/iPhone) */
        @media (max-width: 600px) {
            nav {
                top: 10px;
                right: 10px;
                left: 10px;
                justify-content: center;
                /* Menu ra giữa cho dễ bấm */
            }

            nav a {
                padding: 6px 12px;
                font-size: 0.75rem;
                /* Chữ nhỏ lại cho vừa màn hình hẹp */
            }

            .sub-description {
                letter-spacing: 2px;
                /* Giảm giãn chữ để không bị rớt hàng xấu */
                margin-top: 15px;
            }

            .journey-text {
                font-size: 0.9rem;
            }
        }

        .explore-btn {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 30px;
            color: var(--accent-gold);
            text-decoration: none;
            font-weight: bold;
            border: 2px solid var(--accent-gold);
            border-radius: 30px;
            background: transparent;
            transition: all 0.4s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.9rem;
            position: relative;
            overflow: hidden;
        }

        .explore-btn:hover {
            background: var(--accent-gold);
            color: #1a1a2e;
            box-shadow: 0 0 25px var(--accent-gold);
            transform: scale(1.05);
        }

        /* Tạo tia sáng chạy qua nút */
        .explore-btn::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -100%;
            width: 40%;
            height: 200%;
            background: rgba(255, 255, 255, 0.4);
            transform: rotate(30deg);
            transition: none;
            animation: shine-effect 4s infinite;
            /* Cứ 4 giây tia sáng chạy qua 1 lần */
        }

        @keyframes shine-effect {
            0% {
                left: -100%;
            }

            20% {
                left: 150%;
            }

            100% {
                left: 150%;
            }
        }

        /* PHẢI NẰM NGOÀI NHƯ VẦY NÈ */
        #globe-container {
            position: fixed;
            bottom: -400px;
            /* Đẩy xuống sâu hơn để chỉ hiện đúng 1/2 */
            left: 50%;
            transform: translateX(-50%);
            z-index: 1;
            opacity: 1;
            /* Tăng độ đậm lên cho sáng */
            pointer-events: none;
        }
    </style>
    <script src="//unpkg.com/globe.gl"></script>
</head>

<body>
    <canvas id="stars-canvas"></canvas>
    <div id="globe-container"></div>

    <div class="content-wrapper">
        {% block content %}{% endblock %}
    </div>

    <script>
        const canvas = document.getElementById('stars-canvas');
        const ctx = canvas.getContext('2d');
        let stars = []; let shootingStars = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        class Star {
            constructor() { this.reset(); }
            reset() { this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height; this.size = Math.random() * 2; this.speed = Math.random() * 0.5 + 0.2; this.opacity = Math.random(); }
            update() { this.y -= this.speed; if (this.y < 0) this.reset(); }
            draw() { ctx.fillStyle = `rgba(241, 196, 15, ${this.opacity})`; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); }
        }

        class ShootingStar {
            constructor() { this.reset(); }
            reset() { this.x = Math.random() * canvas.width; this.y = Math.random() * (canvas.height / 2); this.len = Math.random() * 80 + 50; this.speed = Math.random() * 15 + 2; this.active = false; setTimeout(() => { this.active = true; }, Math.random() * 8000); }
            update() { if (!this.active) return; this.x -= this.speed; this.y += this.speed; if (this.x < -this.len || this.y > canvas.height + this.len) { this.active = false; this.reset(); } }
            draw() { if (!this.active) return; ctx.strokeStyle = "rgba(255, 255, 255, 0.6)"; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(this.x, this.y); ctx.lineTo(this.x + this.len, this.y - this.len); ctx.stroke(); }
        }

        // Tối ưu số lượng sao: PC 300 sao, Mobile 100 sao cho mượt
        const starCount = window.innerWidth < 600 ? 100 : 300;
        for (let i = 0; i < starCount; i++) stars.push(new Star());

        for (let i = 0; i < 2; i++) shootingStars.push(new ShootingStar());

        function drawConstellations() {
            // Mobile thì khoảng cách nối dây ngắn lại cho đỡ rối mắt
            const maxDistance = window.innerWidth < 600 ? 60 : 100;
            for (let i = 0; i < stars.length; i++) {
                for (let j = i + 1; j < stars.length; j++) {
                    let dx = stars[i].x - stars[j].x; let dy = stars[i].y - stars[j].y;
                    let distance = Math.sqrt(dx * dx + dy * dy);
                    if (distance < maxDistance) {
                        ctx.strokeStyle = `rgba(241, 196, 15, ${0.15 * (1 - distance / maxDistance)})`;
                        ctx.lineWidth = 0.5; ctx.beginPath(); ctx.moveTo(stars[i].x, stars[i].y); ctx.lineTo(stars[j].x, stars[j].y); ctx.stroke();
                    }
                }
            }
        }

        function animate() { ctx.clearRect(0, 0, canvas.width, canvas.height); drawConstellations(); stars.forEach(s => { s.update(); s.draw(); }); shootingStars.forEach(ss => { ss.update(); ss.draw(); }); requestAnimationFrame(animate); }

        window.addEventListener('load', () => {
            animate();
            setTimeout(() => {
                const ml = document.getElementById('morph-list');
                if (ml) ml.classList.add('active');
            }, 3000);
        });
        // 1. Tự động tính toán kích thước dựa trên màn hình
        const isMobile = window.innerWidth < 768;
        const globeSize = isMobile ? window.innerWidth * 1.2 : 800; // Mobile thì lấy 120% bề ngang, PC lấy 800px

        const globeElement = document.getElementById('globe-container');

        // 2. Khởi tạo quả cầu với biến globeSize
        const world = Globe()
            (globeElement)
            .globeImageUrl('//unpkg.com/three-globe/example/img/earth-blue-marble.jpg')
            .backgroundColor('rgba(0,0,0,0)')
            .width(globeSize)  // Thay 800 bằng globeSize
            .height(globeSize) // Thay 800 bằng globeSize
            .showAtmosphere(true)
            .atmosphereColor('#f1c40f')
            .atmosphereAltitude(isMobile ? 0.15 : 0.25) // Mobile làm hào quang mỏng lại cho đỡ lag
            .pointColor(() => '#f1c40f');

        world.controls().autoRotate = true;
        world.controls().autoRotateSpeed = 1.2;
        world.controls().enableZoom = false;

        // 3. Thêm tính năng: Nếu xoay ngang điện thoại hoặc đổi kích thước trình duyệt thì quả cầu tự chỉnh lại
        window.addEventListener('resize', () => {
            const newSize = window.innerWidth < 768 ? window.innerWidth * 1.2 : 800;
            world.width(newSize);
            world.height(newSize);
        });
    </script>
</body>

</html>
