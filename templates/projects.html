{% extends "base.html" %}

{% block content %}
<style>
    /* NỀN ĐEN SÂU ĐỒNG BỘ TRANG ENGLISH */
    body {
        background-color: #030303 !important;
        background-image:
            radial-gradient(circle at 50% -20%, rgba(241, 196, 15, 0.05) 0%, transparent 50%),
            linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
            linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px) !important;
        background-size: 100% 100%, 40px 40px, 40px 40px !important;
    }

    .dashboard-header {
        text-align: center;
        padding: 60px 0 40px;
    }

    .dashboard-header h1 {
        font-size: 2.2rem;
        font-weight: 800;
        color: #fff;
        letter-spacing: -1px;
        margin-bottom: 10px;
        text-transform: uppercase;
    }

    .status-badge {
        display: inline-block;
        background: rgba(241, 196, 15, 0.1);
        color: var(--accent-gold);
        padding: 4px 12px;
        border-radius: 50px;
        font-size: 0.6rem;
        text-transform: uppercase;
        letter-spacing: 2px;
        border: 1px solid rgba(241, 196, 15, 0.2);
        margin-bottom: 15px;
    }

    /* GRID LAYOUT SANG TRỌNG */
    .project-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
        gap: 30px;
        max-width: 1300px;
        margin: 0 auto;
        padding: 0 20px 100px;
    }

    /* PREMIUM CARD STYLE */
    .premium-card {
        background: #111111;
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 20px;
        padding: 25px;
        transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        position: relative;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
        display: flex;
        flex-direction: column;
    }

    .premium-card:hover {
        border-color: rgba(255, 255, 255, 0.15);
        transform: translateY(-8px);
        background: #151515;
        box-shadow: 0 25px 50px rgba(0, 0, 0, 0.7);
    }

    /* CARD TOP BAR (3 DOTS) */
    .card-top-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        padding-bottom: 12px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.04);
    }

    .dot-group {
        display: flex;
        gap: 6px;
    }

    .dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: #1f1f23;
        transition: 0.3s;
    }

    .premium-card:hover .dot:nth-child(1) {
        background: #ff5f56;
    }

    .premium-card:hover .dot:nth-child(2) {
        background: #ffbd2e;
    }

    .premium-card:hover .dot:nth-child(3) {
        background: #27c93f;
    }

    /* NỘI DUNG CARD */
    .project-preview {
        width: 100%;
        aspect-ratio: 16 / 9;
        background: #080808;
        border-radius: 12px;
        border: 1px solid #1f1f23;
        margin-bottom: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
    }

    .project-preview img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        opacity: 0.6;
        transition: 0.5s;
    }

    .premium-card:hover .project-preview img {
        opacity: 1;
        transform: scale(1.05);
    }

    .card-title {
        color: #fff;
        font-size: 1.2rem;
        font-weight: 700;
        margin-bottom: 8px;
    }

    .card-desc {
        color: #777;
        font-size: 0.85rem;
        line-height: 1.6;
        margin-bottom: 25px;
        min-height: 50px;
    }

    .status-indicator {
        font-size: 0.65rem;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 1px;
        padding: 4px 10px;
        border-radius: 6px;
        margin-left: auto;
    }

    .active-tag {
        color: #00ffcc;
        background: rgba(0, 255, 204, 0.1);
        border: 1px solid rgba(0, 255, 204, 0.2);
    }

    .draft-tag {
        color: #666;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .btn-execute {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 12px;
        background: #121215;
        border: 1px solid #1f1f23;
        color: #fff;
        padding: 12px;
        border-radius: 12px;
        text-decoration: none;
        font-size: 0.8rem;
        font-weight: 600;
        transition: 0.3s;
    }

    .btn-execute:hover {
        background: #fff;
        color: #000;
        border-color: #fff;
    }
</style>

<div class="dashboard-header">
    <span class="status-badge">Project Network • 2026</span>
    <h1>Mission Log Dashboard</h1>
</div>

<div class="project-grid">
    {% for p in projects %}
    {# Thêm dòng if này để lọc: Chỉ hiện những project không phải là Draft #}
    {% if p.url != "#" %}
    <div class="premium-card">
        <div class="card-title">{{ p.name }}</div>
        <a href="{{ p.url }}" class="btn-execute">VIEW <span>→</span></a>
    </div>
    {% endif %}
    {% endfor %}
</div>

<div style="text-align: center; margin-bottom: 80px;">
    <a href="/bio" style="color: #444; text-decoration: none; font-size: 0.75rem; letter-spacing: 3px;">
        / RETURN TO BIO CENTER /
    </a>
</div>
{% endblock %}
