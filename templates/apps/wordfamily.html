<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Word Family</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Comfortaa:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --accent-gold: #f1c40f;
            --soft-white: #ecf0f1;
            --btn-glass: rgba(255, 255, 255, 0.15);
            --panel-glass: rgba(255, 255, 255, 0.08);
            --tab-active: rgba(241, 196, 15, 0.3);
            --text-muted: #bdc3c7;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            /* Giúp app phản hồi nhanh hơn, không bị delay khi bấm */
        }

        body {
            font-family: 'Comfortaa', sans-serif;
            margin: 0;
            min-height: 100vh;
            /* Tối ưu padding cho điện thoại */
            padding-top: env(safe-area-inset-top, 20px);
            padding-bottom: env(safe-area-inset-bottom, 20px);
            padding-left: env(safe-area-inset-left, 10px);
            padding-right: env(safe-area-inset-right, 10px);

            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            position: relative;
            color: white;
            background-color: #000;
            /* Giúp cuộn mượt hơn trên mobile */
            -webkit-overflow-scrolling: touch;
        }

        .bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            transition: opacity 4s ease-in-out;
            background-size: cover;
            /* Đảm bảo hình nền bao phủ hết cả các phần bo cong của màn hình */
            background-position: center;
        }

        #bg-primary {
            opacity: 1;
        }

        #bg-secondary {
            opacity: 0;
        }

        #stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: twinkle var(--d) linear infinite;
        }

        @keyframes twinkle {

            0%,
            100% {
                transform: translateY(0) scale(1);
                opacity: 0.2;
            }

            50% {
                transform: translateY(-10px) scale(1.3);
                opacity: 0.6;
            }
        }

        .header-minimal {
            text-align: center;
            padding: 15px;
            width: 100%;
            z-index: 10;
        }

        .voice-controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        #voice-select {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 0.65rem;
            backdrop-filter: blur(8px);
            width: 180px;
            outline: none;
            cursor: pointer;
        }

        .author-tag {
            font-size: 0.5rem;
            opacity: 0.7;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--accent-gold);
            font-weight: 700;
            margin-top: 4px;
        }

        .signature {
            font-size: 0.55rem;
            opacity: 0.5;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: #bdc3c7;
        }

        .content-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 5;
            width: 95%;
            max-width: 1000px;
            text-align: center;
            padding: 10px;
        }

        .number-display {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(24px, 8vw, 56px);
            font-weight: 900;
            line-height: 1.2;
            color: white;
            text-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
            margin: 0;
            user-select: none;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .label-en {
            font-size: clamp(0.8rem, 2vw, 1.1rem);
            font-weight: 700;
            color: var(--accent-gold);
            margin-top: 10px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .label-vi {
            font-size: clamp(0.7rem, 1.6vw, 0.85rem);
            opacity: 0.9;
            margin-top: 8px;
            color: var(--soft-white);
            max-width: 700px;
            line-height: 1.5;
        }

        .info-grid {
            display: flex;
            gap: 15px;
            width: 100%;
            max-width: 950px;
            margin-top: 20px;
            display: none;
            animation: slideUp 0.8s cubic-bezier(0.23, 1, 0.32, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .info-box {
            flex: 1;
            padding: 20px;
            background: var(--panel-glass);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(20px);
            text-align: left;
            height: 380px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
        }

        .box-title {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--accent-gold);
            margin-bottom: 12px;
            font-weight: 700;
            display: block;
        }

        .tabs-header {
            display: flex;
            gap: 5px;
            margin-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 10px;
        }

        .tab-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ccc;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.65rem;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 700;
        }

        .tab-btn.active {
            background: var(--tab-active);
            border-color: var(--accent-gold);
            color: white;
        }

        .box-content {
            font-size: 0.75rem;
            line-height: 1.7;
            color: #fff;
            overflow-y: auto;
            flex: 1;
        }

        .word-item {
            margin-bottom: 10px;
            padding-left: 10px;
            border-left: 2px solid rgba(255, 255, 255, 0.2);
            animation: fadeIn 0.4s ease;
        }

        .word-en {
            color: var(--accent-gold);
            font-weight: 700;
            display: block;
        }

        .word-vi {
            color: var(--text-muted);
            font-size: 0.7rem;
        }

        .example-item {
            margin-bottom: 12px;
            padding-left: 10px;
            border-left: 2px solid var(--accent-gold);
            animation: fadeIn 0.4s ease;
        }

        .no-data {
            color: rgba(255, 255, 255, 0.3);
            font-style: italic;
            font-size: 0.65rem;
            text-align: center;
            margin-top: 50px;
        }

        .nav-controls {
            display: flex;
            gap: 20px;
            margin-top: 30px;
            margin-bottom: 30px;
            /* Thêm dòng này để nút không bị dính đáy màn hình */
            z-index: 100;
        }

        .nav-btn {
            background: var(--btn-glass);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 14px 30px;
            border-radius: 50px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        .progress-indicator {
            font-size: 0.6rem;
            margin-top: 10px;
            opacity: 0.6;
        }

        @media (max-width: 768px) {
            .content-container {
                padding: 5px;
                /* Giảm padding ngoài để tăng không gian cho nội dung */
            }

            .info-grid {
                flex-direction: column;
                gap: 20px;
                /* Tăng khoảng cách giữa 2 hộp nội dung */
                max-height: 55vh;
                /* Giảm nhẹ chiều cao để lộ nút điều hướng rõ hơn */
                overflow-y: auto;
                padding: 5px;
            }

            .info-box {
                height: auto;
                /* Cho phép hộp co giãn theo nội dung trên mobile */
                min-height: 250px;
                flex: none;
                padding: 15px;
                /* Padding trong hộp vừa phải */
            }
        }
    </style>
</head>

<body>
    <div id="bg-primary" class="bg-layer"></div>
    <div id="bg-secondary" class="bg-layer"></div>
    <div id="stars-container"></div>

    <div class="header-minimal">
        <div class="voice-controls">
            <select id="voice-select"></select>
            <div class="author-tag">Coded & Designed by DuGiaVăn</div>
            <div class="signature">Word Family</div>
        </div>
    </div>

    <div class="content-container">
        <div id="number" class="number-display">READY?</div>
        <div id="text-en" class="label-en">Bạn đã sẵn sàng học chưa?</div>
        <div id="text-vi" class="label-vi">Word Family.
        </div>

        <div id="info-grid" class="info-grid">
            <div class="info-box">
                <span class="box-title">CẤU TRÚC TỪ VỰNG</span>
                <div class="tabs-header">
                    <button class="tab-btn active" onclick="handleTabClick('V')">V</button>
                    <button class="tab-btn" onclick="handleTabClick('N')">N</button>
                    <button class="tab-btn" onclick="handleTabClick('Adj')">Adj</button>
                    <button class="tab-btn" onclick="handleTabClick('Adv')">Adv</button>
                </div>
                <div id="tab-content" class="box-content"></div>
            </div>
            <div class="info-box">
                <span class="box-title">VÍ DỤ THEO TỪ LOẠI</span>
                <div id="ex-content" class="box-content"></div>
            </div>
        </div>

        <div class="nav-controls">
            <button class="nav-btn" onclick="changeWord(-1)">← Trở lại</button>
            <button class="nav-btn" onclick="changeWord(1)">Tiếp theo →</button>
        </div>
        <div id="progress" class="progress-indicator"></div>
    </div>

    <script>
        const vocabData = [
            {

                    Adv: { words: [{ en: "Equally", vi: "một cách ngang bằng" }], examples: ["Divide the cake equally."] }
                }

                    N: { words: [{ en: "Escape", vi: "sự trốn thoát/lối thoát" }], examples: ["A fire escape."] },

                }
            },
            {

                hint: "Thiết lập / Thành lập",

                family: {

            },
            {

                hint: "Ước tính",
                diff: "Lưu ý cách phát âm đuôi -ate cho V và N khác nhau.",
                family: {
                    V: { words: [{ en: "Estimate", vi: "ước lượng/đánh giá" }], examples: ["Estimate the cost."] },
                    N: { words: [{ en: "Estimate", vi: "bản ước tính/sự đánh giá" }, { en: "Estimation", vi: "sự kính trọng/sự đánh giá" }], examples: ["A rough estimate."] },

                    Adv: [],
                }
            },
            {

                hint: "Sự kiện",
                diff: "Gốc của tính từ Eventful (nhiều sự kiện đáng nhớ).",
                family: {
                    V: [],
                    N: { words: [{ en: "Event", vi: "sự kiện" }], examples: ["A sporting event."] },
                    Adj: { words: [{ en: "Eventful", vi: "có nhiều sự kiện quan trọng" }, { en: "Uneventful", vi: "tẻ nhạt/bình lặng" }], examples: ["An eventful year."] },
                    Adv: { words: [{ en: "Eventually", vi: "cuối cùng thì" }], examples: ["He eventually escaped."] }
                }
            },
            {
                word: "EXACT",
                hint: "Chính xác",
                diff: "Dùng khi nói về số liệu hoặc yêu cầu khắt khe.",
                family: {
                    V: { words: [{ en: "Exact", vi: "đòi hỏi/ép buộc" }], examples: ["To exact revenge."] },
                    N: { words: [{ en: "Exactness", vi: "tính chính xác" }], examples: ["Precision and exactness."] },
                    Adj: { words: [{ en: "Exact", vi: "chính xác" }], examples: ["The exact time."] },
                    Adv: { words: [{ en: "Exactly", vi: "một cách chính xác" }], examples: ["That's exactly what I meant."] }
                }
            }
        ];

        let currentIndex = -1;
        let currentTab = 'V';
        const synth = window.speechSynthesis;
        let voicesList = [];

        const gradients = [
            'linear-gradient(135deg, #0f2027, #203a43, #2c5364)',
            'linear-gradient(135deg, #141e30, #243b55, #2c3e50)',
            'linear-gradient(135deg, #1a2a6c, #2a0845)',
            'linear-gradient(135deg, #000428, #004e92)'
        ];

        let currentGradIdx = 0;
        let isPrimaryActive = true;

        function updateSeamlessBackground() {
            currentGradIdx = (currentGradIdx + 1) % gradients.length;
            const primary = document.getElementById('bg-primary');
            const secondary = document.getElementById('bg-secondary');

            if (isPrimaryActive) {
                secondary.style.background = gradients[currentGradIdx];
                secondary.style.opacity = '1';
                primary.style.opacity = '0';
            } else {
                primary.style.background = gradients[currentGradIdx];
                primary.style.opacity = '1';
                secondary.style.opacity = '0';
            }
            isPrimaryActive = !isPrimaryActive;
        }

        function handleTabClick(type) {
            currentTab = type;
            renderTabData();
        }

        function renderTabData() {
            const btns = document.querySelectorAll('.tab-btn');
            btns.forEach(btn => {
                btn.classList.toggle('active', btn.innerText === currentTab);
            });

            const item = vocabData[currentIndex];
            const content = document.getElementById('tab-content');
            const exContent = document.getElementById('ex-content');

            if (item && item.family[currentTab]) {
                const data = item.family[currentTab];

                if (!data.words || data.words.length === 0) {
                    content.innerHTML = `<div class="no-data">Dạng từ này không phổ biến hoặc ít được sử dụng trong giao tiếp thực tế.</div>`;
                } else {
                    content.innerHTML = data.words.map(w => `
                        <div class="word-item">
                            <span class="word-en">${w.en}</span>
                            <span class="word-vi">${w.vi}</span>
                        </div>
                    `).join('');
                }

                exContent.innerHTML = data.examples.map(ex => `
                    <div class="example-item">
                        ${ex}
                    </div>
                `).join('');
            }
        }

        function speak(text) {
            if (synth.speaking) synth.cancel();
            setTimeout(() => {
                const msg = new SpeechSynthesisUtterance(text);
                const selectedIdx = document.getElementById('voice-select').value;
                if (voicesList[selectedIdx]) {
                    msg.voice = voicesList[selectedIdx];
                    msg.lang = voicesList[selectedIdx].lang;
                }
                msg.rate = 0.9;
                synth.speak(msg);
            }, 50);
        }

        function changeWord(step) {
            currentIndex += step;
            if (currentIndex >= vocabData.length) currentIndex = 0;
            if (currentIndex < 0) currentIndex = vocabData.length - 1;

            const item = vocabData[currentIndex];
            document.getElementById('number').innerText = item.word;
            document.getElementById('text-en').innerText = item.hint;
            document.getElementById('text-vi').innerText = item.diff;
            document.getElementById('progress').innerText = `${currentIndex + 1} / ${vocabData.length}`;

            document.getElementById('info-grid').style.display = "flex";

            renderTabData();
            speak(item.word);
        }

        function loadVoices() {
            voicesList = synth.getVoices().filter(v => v.lang.includes('en'));
            const select = document.getElementById('voice-select');
            if (voicesList.length > 0) {
                const currentVal = select.value;
                select.innerHTML = '';
                voicesList.forEach((v, i) => {
                    const option = document.createElement('option');
                    option.value = i;
                    option.textContent = v.name;
                    select.appendChild(option);
                });
                if (currentVal) select.value = currentVal;
            }
        }

        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = loadVoices;
        }

        window.onload = () => {
            loadVoices();
            document.getElementById('bg-primary').style.background = gradients[0];
            setInterval(updateSeamlessBackground, 6000);

            const stars = document.getElementById('stars-container');
            for (let i = 0; i < 80; i++) {
                const s = document.createElement('div');
                s.className = 'star';
                s.style.left = Math.random() * 100 + '%';
                s.style.top = Math.random() * 100 + '%';
                s.style.width = s.style.height = (Math.random() * 1.5 + 0.5) + 'px';
                s.style.setProperty('--d', (Math.random() * 5 + 2) + 's');
                stars.appendChild(s);
            }
        };
    </script>
