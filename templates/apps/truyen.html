                    { en: "'If you break this taboo, I will be lost to you forever,' he added.", vi: "'Nếu nàng phá vỡ điều cấm kỵ này, ta sẽ mất nàng mãi mãi,' chàng nói thêm.", scene: "Điều cấm" },

                    // --- PHẦN 3: SỰ PHẢN BỘI VÀ HẬU QUẢ ---
                    { en: "One day, the Princess felt homesick and asked to visit her family.", vi: "Một ngày nọ, Công chúa cảm thấy nhớ nhà và xin được về thăm gia đình.", scene: "Nhớ nhà" },
                    { en: "The crow agreed but reminded her of the secret she must keep.", vi: "Con quạ đồng ý nhưng nhắc nhở nàng về bí mật mà nàng phải giữ kín.", scene: "Dặn dò" },
                    { en: "At the palace, her sisters were jealous of her mysterious happiness.", vi: "Tại cung điện, các chị của nàng ghen tị với hạnh phúc bí ẩn của nàng.", scene: "Ghen tị" },
                    { en: "They questioned her repeatedly until she finally revealed the truth.", vi: "Họ thẩm vấn nàng liên tục cho đến khi cuối cùng nàng tiết lộ sự thật.", scene: "Tiết lộ" },
                    { en: "She told them that the crow was actually a handsome, enchanted Prince.", vi: "Nàng kể cho họ rằng con quạ thực chất là một Hoàng tử bị phù phép đẹp trai.", scene: "Phản bội" },
                    { en: "As soon as the words left her lips, a cold wind blew through the room.", vi: "Ngay khi những lời đó thốt ra, một luồng gió lạnh thổi qua căn phòng.", scene: "Điềm báo" },
                    { en: "She heard a mournful cry and saw the crow flying away in the distance.", vi: "Nàng nghe thấy một tiếng kêu thê lương và thấy con quạ đang bay đi ở đằng xa.", scene: "Biến mất" },
                    { en: "The Princess realized her mistake and wept bitterly for her lost love.", vi: "Công chúa nhận ra sai lầm của mình và khóc nức nở vì tình yêu đã mất.", scene: "Hối hận" },
                    { en: "She knew she had to find him, no matter how far she had to walk.", vi: "Nàng biết mình phải tìm chàng, dù có phải đi bộ bao xa đi chăng nữa.", scene: "Quyết tâm" },
                    { en: "She put on a pair of iron shoes and set out on a long journey.", vi: "Nàng xỏ một đôi giày sắt và lên đường thực hiện chuyến hành trình dài.", scene: "Lên đường" },

                    // --- PHẦN 4: HÀNH TRÌNH TÌM KIẾM HOÀNG TỬ ---
                    { en: "She traveled through dark forests and over jagged, icy mountains.", vi: "Nàng băng qua những khu rừng tối tăm và những dãy núi băng giá lởm chởm.", scene: "Gian khổ" },
                    { en: "Her iron shoes wore thin, but her heart remained strong.", vi: "Đôi giày sắt của nàng mòn dần, nhưng trái tim nàng vẫn kiên cường.", scene: "Kiên trì" },
                    { en: "She reached the House of the Sun and asked for news of the crow.", vi: "Nàng đến được Ngôi nhà của Mặt trời và hỏi tin tức về con quạ.", scene: "Nhà Mặt Trời" },
                    { en: "The Sun replied: 'I shine on many things, but I have not seen him.'", vi: "Mặt trời trả lời: 'Ta soi sáng nhiều thứ, nhưng ta chưa thấy hắn.'", scene: "Mặt Trời" },
                    { en: "He gave her a golden spinning wheel as a gift to help her later.", vi: "Mặt trời tặng nàng một cái guồng quay sợi bằng vàng để giúp nàng sau này.", scene: "Quà tặng 1" },
                    { en: "Next, she went to the House of the Moon and asked the same question.", vi: "Tiếp theo, nàng đến Ngôi nhà của Mặt trăng và hỏi câu hỏi tương tự.", scene: "Nhà Mặt Trăng" },
                    { en: "The Moon said: 'I see many secrets at night, but not your Prince.'", vi: "Mặt trăng nói: 'Ta thấy nhiều bí mật vào ban đêm, nhưng không thấy Hoàng tử của nàng.'", scene: "Mặt Trăng" },
                    { en: "The Moon gave her a golden reel as a token of encouragement.", vi: "Mặt trăng tặng nàng một ống cuộn chỉ bằng vàng như một biểu tượng khích lệ.", scene: "Quà tặng 2" },
                    { en: "Finally, she reached the House of the North Wind, who was fierce and loud.", vi: "Cuối cùng, nàng đến Ngôi nhà của Gió Bắc, kẻ hung dữ và ồn ào.", scene: "Nhà Gió Bắc" },
                    { en: "The North Wind shouted: 'I know where he is! He is at the Glass Mountain!'", vi: "Gió Bắc hét lớn: 'Ta biết hắn ở đâu! Hắn đang ở trên Núi Thủy Tinh!'", scene: "Manh mối" },

                    // --- PHẦN 5: NÚI THỦY TINH VÀ THỬ THÁCH CUỐI CÙNG ---
                    { en: "The North Wind carried her to the foot of a steep, slippery Glass Mountain.", vi: "Gió Bắc đưa nàng đến chân một ngọn Núi Thủy Tinh dốc đứng và trơn trượt.", scene: "Núi Thủy Tinh" },
                    { en: "The mountain was so smooth that no human could ever hope to climb it.", vi: "Ngọn núi nhẵn đến mức không con người nào có thể hy vọng leo lên được.", scene: "Trở ngại" },
                    { en: "She used a magical bone to create steps and finally reached the top.", vi: "Nàng dùng một chiếc xương thần kỳ để tạo ra các bậc thang và cuối cùng lên tới đỉnh.", scene: "Leo núi" },
                    { en: "At the summit stood a magnificent castle where the Prince was held captive.", vi: "Trên đỉnh núi là một lâu đài tráng lệ nơi Hoàng tử đang bị giam cầm.", scene: "Lâu đài trên đỉnh" },
                    { en: "However, he was under the influence of another wicked woman.", vi: "Tuy nhiên, chàng đang chịu sự thao túng của một người đàn bà độc ác khác.", scene: "Kẻ thù mới" },
                    { en: "She had given him a potion of forgetfulness, and he did not remember his bride.", vi: "Bà ta đã cho chàng uống thuốc quên lãng, và chàng không còn nhớ vợ mình.", scene: "Quên lãng" },
                    { en: "The Princess decided to trade her golden gifts to see the Prince.", vi: "Công chúa quyết định dùng những món quà vàng của mình để được gặp Hoàng tử.", scene: "Giao dịch" },
                    { en: "She showed the golden spinning wheel, and the wicked woman was mesmerized.", vi: "Nàng cho xem cái guồng quay sợi vàng, và người đàn bà độc ác bị mê hoặc.", scene: "Guồng quay vàng" },
                    { en: "'Give me that, and you may spend one night with him,' the woman said.", vi: "'Đưa nó cho ta, và ngươi có thể ở bên hắn một đêm,' người đàn bà nói.", scene: "Đổi chác" },
                    { en: "But that night, the Prince was drugged and did not wake up to see her.", vi: "Nhưng đêm đó, Hoàng tử đã bị đánh thuốc và không thức dậy để gặp nàng.", scene: "Thất bại lần 1" },

                    // --- PHẦN 6: SỰ THỨC TỈNH CỦA TÌNH YÊU ---
                    { en: "The Princess wept all night, singing songs about their past together.", vi: "Công chúa khóc suốt đêm, hát những bài hát về quá khứ của họ bên nhau.", scene: "Tiếng hát" },
                    { en: "The next day, she traded the golden reel for a second night.", vi: "Ngày hôm sau, nàng đổi ống cuộn chỉ vàng để lấy đêm thứ hai.", scene: "Lần thứ hai" },
                    { en: "Again, the Prince was deep in sleep and did not hear her cries.", vi: "Một lần nữa, Hoàng tử lại ngủ say và không nghe thấy tiếng khóc của nàng.", scene: "Thất bại lần 2" },
                    { en: "A kind servant heard the Princess and warned the Prince about the potion.", vi: "Một người hầu tốt bụng đã nghe thấy Công chúa và cảnh báo Hoàng tử về lọ thuốc.", scene: "Người hầu tốt" },
                    { en: "On the third night, the Prince only pretended to drink the drugged wine.", vi: "Vào đêm thứ ba, Hoàng tử chỉ giả vờ uống rượu có pha thuốc.", scene: "Mưu kế" },
                    { en: "When the Princess entered, he was wide awake and recognized her.", vi: "Khi Công chúa bước vào, chàng hoàn toàn tỉnh táo và nhận ra nàng.", scene: "Nhận ra" },
                    { en: "The memories came rushing back, and the spell of forgetfulness broke.", vi: "Ký ức ùa về, và bùa chú quên lãng bị phá vỡ.", scene: "Hồi phục" },
                    { en: "'My faithful bride, you have found me at last!' the Prince cried.", vi: "'Người vợ thủy chung của ta, cuối cùng nàng đã tìm thấy ta!' Hoàng tử kêu lên.", scene: "Vui mừng" },
                    { en: "They embraced, and the black crow feathers vanished from his heart forever.", vi: "Họ ôm chầm lấy nhau, và những chiếc lông quạ đen biến mất khỏi trái tim chàng mãi mãi.", scene: "Giải thoát" },
                    { en: "The wicked woman was driven out of the castle by the Prince's guards.", vi: "Người đàn bà độc ác bị lính gác của Hoàng tử đuổi ra khỏi lâu đài.", scene: "Công lý" },

                    // --- PHẦN 7: SỰ TRỞ VỀ VINH QUANG ---
                    { en: "The castle on the Glass Mountain was restored to its former glory.", vi: "Lâu đài trên Núi Thủy Tinh được khôi phục lại vinh quang trước đây.", scene: "Khôi phục" },
                    { en: "The dust and cobwebs disappeared, replaced by light and music.", vi: "Bụi bặm và mạng nhện biến mất, thay thế bằng ánh sáng và âm nhạc.", scene: "Thay đổi" },
                    { en: "The Prince and Princess returned to her father's kingdom in a golden carriage.", vi: "Hoàng tử và Công chúa trở về vương quốc của cha nàng trên một cỗ xe vàng.", scene: "Trở về" },
                    { en: "The King was overjoyed to see his youngest daughter alive and happy.", vi: "Nhà vua vô cùng vui mừng khi thấy cô con gái út còn sống và hạnh phúc.", scene: "Đoàn tụ" },
                    { en: "The two jealous sisters were ashamed and apologized for their actions.", vi: "Hai cô chị ghen tị cảm thấy hổ thẹn và xin lỗi vì hành động của mình.", scene: "Hối lỗi" },
                    { en: "The Prince forgave everyone, for his heart was full of joy.", vi: "Hoàng tử tha thứ cho tất cả mọi người, vì trái tim chàng tràn ngập niềm vui.", scene: "Vị tha" },
                    { en: "A grand festival was held, lasting for thirty days and thirty nights.", vi: "Một lễ hội lớn được tổ chức, kéo dài trong ba mươi ngày và ba mươi đêm.", scene: "Lễ hội" },
                    { en: "The Princess's iron shoes were kept in a museum as a symbol of loyalty.", vi: "Đôi giày sắt của Công chúa được giữ trong bảo tàng như một biểu tượng của lòng thủy chung.", scene: "Biểu tượng" },
                    { en: "The story of the Enchanted Crow became a legend across the Slavic lands.", vi: "Câu chuyện về Con Quạ bị phù phép đã trở thành một huyền thoại khắp các vùng đất Slav.", scene: "Huyền thoại" },
                    { en: "They lived in peace and ruled their kingdom with wisdom and love.", vi: "Họ sống trong hòa bình và cai trị vương quốc của mình bằng sự thông tuệ và tình yêu.", scene: "Kết thúc" },

                    // --- PHẦN 8: BÀI HỌC VÀ CHI TIẾT SÂU SẮC ---
                    { en: "The Princess learned that true love requires patience and sacrifice.", vi: "Công chúa học được rằng tình yêu đích thực đòi hỏi sự kiên nhẫn và hy sinh.", scene: "Bài học" },
                    { en: "The golden spinning wheel and reel were magical artifacts of the gods.", vi: "Cái guồng quay sợi và ống cuộn chỉ vàng là những bảo vật thần kỳ của các vị thần.", scene: "Báu vật" },
                    { en: "Every step in her iron shoes was a testament to her devotion.", vi: "Mỗi bước chân trên đôi giày sắt là một minh chứng cho sự tận hiến của nàng.", scene: "Lòng tin" },
                    { en: "The North Wind's breath was cold, but his heart was moved by her story.", vi: "Hơi thở của Gió Bắc lạnh giá, nhưng trái tim ông bị lay động bởi câu chuyện của nàng.", scene: "Cảm động" },
                    { en: "The Prince never again felt the urge to fly away as a bird of darkness.", vi: "Hoàng tử không bao giờ còn cảm thấy thôi thúc muốn bay đi như một con chim bóng tối nữa.", scene: "Bình yên" },
                    { en: "Their children grew up hearing the tale of the crow and the golden gifts.", vi: "Con cái của họ lớn lên được nghe kể về câu chuyện con quạ và những món quà vàng.", scene: "Di sản" },
                    { en: "The Glass Mountain remained a symbol of the heights love can reach.", vi: "Núi Thủy Tinh vẫn là biểu tượng cho những đỉnh cao mà tình yêu có thể chạm tới.", scene: "Tượng trưng" },
                    { en: "Light always conquers darkness when hearts are pure and true.", vi: "Ánh sáng luôn chiến thắng bóng tối khi những trái tim thuần khiết và chân thành.", scene: "Triết lý" },
                    { en: "The stars above the Slavic lands shone brighter for the King and Queen.", vi: "Những vì sao trên vùng đất Slav tỏa sáng rực rỡ hơn dành cho Nhà vua và Hoàng hậu.", scene: "Vĩnh cửu" },
                    { en: "And they lived happily and peacefully for the rest of their days.", vi: "Và họ đã sống hạnh phúc và bình yên trong suốt phần đời còn lại của mình.", scene: "Hạnh phúc" }
                ]
            },
            cowherdWeaverGirl: {
                titleEn: "The Cowherd and the Weaver Girl",
                titleVi: "Ngưu Lang và Chức Nữ",
                data: [
                    // --- PHẦN 1: THE COWHERD VÀ CON BÒ THẦN ---
                    { en: "Once upon a time, there was a kind and hardworking man known as the Cowherd.", vi: "Ngày xửa ngày xưa, có một chàng trai nhân hậu và chăm chỉ được gọi là Ngưu Lang.", scene: "Giới thiệu" },
                    { en: "The Cowherd lived a lonely life, with only an old ox as his constant companion.", vi: "Chàng Ngưu Lang sống một cuộc đời cô độc, chỉ có một con bò già làm bạn đồng hành thân thiết.", scene: "Cô độc" },
                    { en: "Unknown to him, the ox was actually a fallen star-deity from the heavens.", vi: "Chàng không hề biết rằng, con bò thực chất là một vị tiên hạ phàm từ thiên đình.", scene: "Bí mật" },
                    { en: "One day, the ox began to speak, surprising the young Cowherd.", vi: "Một ngày nọ, con bò bắt đầu cất tiếng nói, khiến chàng Ngưu Lang vô cùng ngạc nhiên.", scene: "Kỳ lạ" },
                    { en: "'Go to the silver lake,' the ox said, 'and you will find your destiny.'", vi: "'Hãy đến hồ bạc,' con bò nói, 'và anh sẽ tìm thấy định mệnh của mình.'", scene: "Lời chỉ dẫn" },
                    { en: "The ox told him that the seven daughters of the Jade Emperor would come to bathe.", vi: "Con bò kể rằng bảy cô con gái của Ngọc Hoàng sẽ xuống đó tắm.", scene: "Tiết lộ" },
                    { en: "He advised the Cowherd to take the red robe of the youngest sister, the Weaver Girl.", vi: "Nó khuyên Ngưu Lang hãy lấy chiếc áo bào đỏ của cô em út, Chức Nữ.", scene: "Mưu kế" },
                    { en: "Without her magical robe, the Weaver Girl would not be able to fly back to heaven.", vi: "Nếu không có chiếc áo bào thần kỳ, Chức Nữ sẽ không thể bay trở lại thiên đình.", scene: "Điều kiện" },
                    { en: "The Cowherd followed the advice and hid behind the trees near the lake.", vi: "Ngưu Lang làm theo lời khuyên và trốn sau những lùm cây gần hồ.", scene: "Rình rập" },
                    { en: "He watched as the beautiful goddesses descended from the clouds.", vi: "Chàng dõi theo những nàng tiên xinh đẹp hạ phàm từ những đám mây.", scene: "Tiên giáng trần" },

                    // --- PHẦN 2: CUỘC GẶP GỠ ĐỊNH MỆNH ---
                    { en: "The sisters laughed and played in the crystal-clear water.", vi: "Các chị em cười đùa và vui chơi trong dòng nước trong vắt như pha lê.", scene: "Vui đùa" },
                    { en: "The Cowherd quietly took the red robe and waited for them to finish.", vi: "Ngưu Lang lặng lẽ lấy chiếc áo bào đỏ và đợi họ tắm xong.", scene: "Lấy áo" },
                    { en: "When it was time to leave, the six elder sisters flew away into the sky.", vi: "Đến lúc phải đi, sáu cô chị bay vút lên bầu trời.", scene: "Rời đi" },
                    { en: "The Weaver Girl remained behind, searching desperately for her lost garment.", vi: "Chức Nữ ở lại, tuyệt vọng tìm kiếm bộ y phục đã mất của mình.", scene: "Lo lắng" },
                    { en: "The Cowherd stepped out from the shadows, holding the magical robe.", vi: "Ngưu Lang bước ra từ bóng tối, tay cầm chiếc áo bào thần kỳ.", scene: "Xuất hiện" },
                    { en: "He was struck by her divine beauty and fell in love instantly.", vi: "Chàng bị hớp hồn bởi vẻ đẹp thần tiên của nàng và đem lòng yêu ngay lập tức.", scene: "Ái tình" },
                    { en: "The Weaver Girl was also moved by his honest and kind face.", vi: "Chức Nữ cũng cảm động trước khuôn mặt trung hậu của chàng.", scene: "Rung động" },
                    { en: "The Cowherd promised to cherish her forever if she stayed with him on Earth.", vi: "Chàng hứa sẽ trân trọng nàng mãi mãi nếu nàng ở lại trần gian cùng chàng.", scene: "Lời hứa" },
                    { en: "The Weaver Girl agreed, and they were married in a happy ceremony.", vi: "Chức Nữ đồng ý, và họ kết hôn trong một buổi lễ hạnh phúc.", scene: "Kết hôn" },
                    { en: "The heavenly weaver became a mortal's bride, leaving her loom behind.", vi: "Nàng tiên dệt vải trở thành cô dâu của một người trần, rời bỏ khung cửi phía sau.", scene: "Thay đổi" },

                    // --- PHẦN 3: CUỘC SỐNG HẠNH PHÚC ---
                    { en: "Years passed, and the Cowherd and the Weaver Girl lived a blissful life.", vi: "Năm tháng trôi qua, Ngưu Lang và Chức Nữ sống một cuộc đời hạnh phúc.", scene: "Hạnh phúc" },
                    { en: "He worked in the fields while she wove beautiful fabrics at home.", vi: "Chàng làm việc ngoài đồng trong khi nàng dệt những tấm vải tuyệt đẹp tại nhà.", scene: "Lao động" },
                    { en: "They were blessed with two beautiful children, a boy and a girl.", vi: "Họ được ban phước với hai đứa con kháu khỉnh, một trai và một gái.", scene: "Con cái" },
                    { en: "The love between the Cowherd and the Weaver Girl was strong and pure.", vi: "Tình yêu giữa Ngưu Lang và Chức Nữ thật mạnh mẽ và thuần khiết.", scene: "Tình yêu" },
                    { en: "The Weaver Girl almost forgot her divine origins and her duty to the heavens.", vi: "Chức Nữ gần như quên đi nguồn gốc thần tiên và nhiệm vụ của mình.", scene: "Quên lãng" },
                    { en: "She was famous for weaving the colorful clouds in the sunset sky.", vi: "Nàng vốn nổi tiếng với việc dệt nên những đám mây ngũ sắc.", scene: "Ký ức" },
                    { en: "Without her, the tapestry of the sky began to fade and lose its color.", vi: "Thiếu nàng, bức thảm của bầu trời bắt đầu phai nhạt và mất đi màu sắc.", scene: "Hậu quả" },
                    { en: "The Queen Mother of the West eventually noticed her absence.", vi: "Tây Vương Mẫu cuối cùng cũng nhận ra sự vắng mặt của nàng.", scene: "Phát hiện" },
                    { en: "The Queen Mother was furious that a goddess had married a lowly mortal.", vi: "Bà ta vô cùng giận dữ vì một vị nữ thần đã kết hôn với người phàm.", scene: "Phẫn nộ" },
                    { en: "She ordered the guards to bring the Weaver Girl back immediately.", vi: "Bà ra lệnh cho lính gác phải đưa Chức Nữ trở về ngay lập tức.", scene: "Mệnh lệnh" },

                    // --- PHẦN 4: SỰ CHIA CẮT ---
                    { en: "One afternoon, while the Cowherd was away, the sky turned dark.", vi: "Một buổi chiều, khi Ngưu Lang đi vắng, bầu trời trở nên tối tăm.", scene: "Điềm xấu" },
                    { en: "The guards descended and seized the Weaver Girl, dragging her away.", vi: "Lính gác hạ phàm và bắt giữ Chức Nữ, lôi nàng đi.", scene: "Bắt giữ" },
                    { en: "The Weaver Girl cried out for her husband and children.", vi: "Chức Nữ kêu cứu chồng và các con.", scene: "Tiếng khóc" },
                    { en: "When the Cowherd returned, he found his children weeping and his wife gone.", vi: "Khi Ngưu Lang trở về, chàng thấy các con đang khóc và vợ mình đã biến mất.", scene: "Bàng hoàng" },
                    { en: "The old ox spoke to the Cowherd for the last time before passing.", vi: "Con bò già nói chuyện với Ngưu Lang lần cuối trước khi qua đời.", scene: "Lời cuối" },
                    { en: "'Kill me and wear my hide,' the ox whispered, 'it will take you to the clouds.'", vi: "'Hãy giết ta và mặc da của ta vào,' con bò thì thầm, 'nó sẽ đưa anh lên trời.'", scene: "Hy sinh" },
                    { en: "With tears in his eyes, the Cowherd obeyed the faithful animal's wish.", vi: "Với những giọt nước mắt, Ngưu Lang đã tuân theo di nguyện của con vật thủy chung.", scene: "Đau lòng" },
                    { en: "He put his children in baskets and prepared to chase the guards.", vi: "Chàng đặt các con vào giỏ và chuẩn bị đuổi theo lính gác.", scene: "Chuẩn bị" },
                    { en: "Wearing the magical hide, the Cowherd flew up to find his wife.", vi: "Khoác bộ da thần kỳ, Ngưu Lang bay lên trời để tìm vợ.", scene: "Đuổi theo" },
                    { en: "He was almost close enough to touch the Weaver Girl's hand.", vi: "Chàng đã ở rất gần, đủ để chạm vào tay Chức Nữ.", scene: "Hy vọng" },

                    // --- PHẦN 5: DẢI NGÂN HÀ ---
                    { en: "The Queen Mother saw him coming and used her golden hairpin.", vi: "Vương Mẫu thấy chàng đang đến gần liền dùng chiếc trâm cài tóc bằng vàng.", scene: "Ngăn chặn" },
                    { en: "She drew a deep line across the sky to separate the lovers.", vi: "Bà vạch một đường sâu thẳm ngang qua bầu trời để chia cắt đôi tình nhân.", scene: "Phù phép" },
                    { en: "The line turned into a roaring Silver River, known as the Milky Way.", vi: "Đường vạch đó biến thành một dòng Sông Bạc, chính là dải Ngân Hà.", scene: "Ngân Hà" },
                    { en: "The Cowherd was trapped on one side, and the Weaver Girl on the other.", vi: "Ngưu Lang bị kẹt ở một bên, và Chức Nữ ở bên kia.", scene: "Chia cách" },
                    { en: "The Silver River was too wide for any mortal to cross.", vi: "Dòng Sông Bạc quá rộng để bất kỳ người trần nào có thể vượt qua.", scene: "Trở ngại" },
                    { en: "They stood on opposite banks, weeping for each other.", vi: "Họ đứng ở hai bờ đối diện, khóc thương cho nhau.", scene: "Đau khổ" },
                    { en: "Their sorrow touched the hearts of all creatures in the world.", vi: "Nỗi đau của họ chạm đến trái tim của muôn loài trên thế gian.", scene: "Cảm động" },
                    { en: "The Jade Emperor felt pity for the devotion of the Cowherd and his wife.", vi: "Ngọc Hoàng thương xót cho sự thủy chung của Ngưu Lang và vợ chàng.", scene: "Thương xót" },
                    { en: "He allowed the Cowherd and the Weaver Girl to meet once every year.", vi: "Ông cho phép Ngưu Lang và Chức Nữ gặp nhau mỗi năm một lần.", scene: "Ban ân" },
                    { en: "They would meet on the seventh day of the seventh lunar month.", vi: "Họ sẽ gặp nhau vào ngày thứ bảy của tháng thứ bảy âm lịch.", scene: "Ước định" },

                    // --- PHẦN 6: ĐOÀN TỤ ---
                    { en: "Thousands of magpies flew to the sky to help the lovers cross the river.", vi: "Hàng ngàn con chim khách đã bay lên trời để giúp họ vượt sông.", scene: "Đàn chim khách" },
                    { en: "They linked their wings to form a bridge across the Silver River.", vi: "Chúng kết nối đôi cánh để tạo thành một cây cầu bắc qua Sông Bạc.", scene: "Cầu Ô Thước" },
                    { en: "The Cowherd and the Weaver Girl ran toward each other on the bridge.", vi: "Ngưu Lang và Chức Nữ chạy về phía nhau trên cây cầu.", scene: "Gặp lại" },
                    { en: "They embraced tightly, sharing their love for a few precious hours.", vi: "Họ ôm chặt lấy nhau, sẻ chia tình yêu trong vài giờ quý giá.", scene: "Đoàn tụ" },
                    { en: "The children were reunited with the Weaver Girl for that single day.", vi: "Những đứa trẻ được đoàn tụ với Chức Nữ trong ngày duy nhất đó.", scene: "Gia đình" },
                    { en: "When the sun rose, the Cowherd and the Weaver Girl had to part again.", vi: "Khi mặt trời mọc, Ngưu Lang và Chức Nữ lại phải chia xa.", scene: "Ly biệt" },
                    { en: "They promised to wait for each other until the next year.", vi: "Họ hứa sẽ chờ đợi nhau cho đến năm sau.", scene: "Lời thề" },
                    { en: "This day is celebrated as the Qixi Festival, or Chinese Valentine's Day.", vi: "Ngày này được tổ chức như lễ Thất Tịch, ngày lễ tình nhân Trung Hoa.", scene: "Lễ hội" },
                    { en: "The light rain on Qixi is said to be the tears of the lovers.", vi: "Mưa ngâu vào ngày Thất Tịch được cho là nước mắt của đôi tình nhân.", scene: "Mưa ngâu" },
                    { en: "Their story is a testament to the power of eternal love.", vi: "Câu chuyện của họ là một minh chứng cho sức mạnh của tình yêu vĩnh cửu.", scene: "Kết thúc" },

                    // --- CÁC PHẦN CÒN LẠI TIẾP TỤC DÙNG TÊN ANH (THE COWHERD / THE WEAVER GIRL)... ---
                    { en: "Vega represents the Weaver Girl, forever watching the river.", vi: "Sao Chức Nữ đại diện cho nàng tiên dệt vải, mãi mãi dõi theo dòng sông.", scene: "Thiên văn" },
                    { en: "Altair represents the Cowherd, standing with his two children.", vi: "Sao Ngưu Lang đại diện cho chàng chăn bò, đứng cùng hai con mình.", scene: "Thiên văn" },
                    { en: "True love like theirs will never be forgotten by the world.", vi: "Tình yêu đích thực như của họ sẽ không bao giờ bị thế gian lãng quên.", scene: "Trường tồn" }
                    // ... (Bạn có thể thêm tiếp các thẻ suy ngẫm tương tự với tên gọi này)
                ]
            },
            changeMoon: {
                titleEn: "Chang'e Flies to the Moon",
                titleVi: "Hằng Nga Bôn Nguyệt",
                data: [
                    // --- PHẦN 1: MƯỜI MẶT TRỜI VÀ CHÀNG XẠ THỦ ---
                    { en: "In ancient times, ten suns appeared in the sky at once, scorching the earth.", vi: "Vào thời cổ đại, mười mặt trời cùng lúc xuất hiện, thiêu rụi cả mặt đất.", scene: "Tai họa" },
                    { en: "The great archer, Hou Yi, used his mystical bow to shoot down nine of them.", vi: "Chàng xạ thủ vĩ đại, Hậu Nghệ, đã dùng cây cung thần bắn hạ chín mặt trời.", scene: "Anh hùng" },
                    { en: "For his bravery, he became a hero and saved humanity from the burning heat.", vi: "Vì sự dũng cảm của mình, chàng đã trở thành anh hùng và cứu nhân loại khỏi sức nóng thiêu đốt.", scene: "Cứu rỗi" },
                    { en: "Hou Yi had a beautiful and kind wife named Chang'e.", vi: "Hậu Nghệ có một người vợ xinh đẹp và nhân hậu tên là Hằng Nga.", scene: "Giới thiệu" },
                    { en: "The Goddess of Heaven rewarded Hou Yi with the Elixir of Immortality.", vi: "Tây Vương Mẫu đã ban thưởng cho Hậu Nghệ thuốc trường sinh bất tử.", scene: "Phần thưởng" },
                    { en: "One bottle of the elixir could make a person fly to heaven and become a deity.", vi: "Một lọ thuốc có thể khiến một người bay lên trời và trở thành một vị thần.", scene: "Thần dược" },
                    { en: "Hou Yi did not want to leave his beloved Chang'e, so he gave her the elixir to hide.", vi: "Hậu Nghệ không muốn rời xa Hằng Nga yêu dấu, nên đã đưa thuốc cho nàng cất giữ.", scene: "Tình yêu" },
                    { en: "Chang'e hid the bottle in a secret wooden box behind her bed.", vi: "Hằng Nga giấu lọ thuốc trong một chiếc hộp gỗ bí mật phía sau giường.", scene: "Cất giấu" },
                    { en: "However, a greedy apprentice named Peng Meng saw where the elixir was hidden.", vi: "Tuy nhiên, một tên học trò tham lam tên là Phùng Mông đã thấy nơi giấu thuốc.", scene: "Kẻ phản bội" },
                    { en: "He planned to steal the magical potion when Hou Yi was away hunting.", vi: "Hắn âm mưu đánh cắp liều thuốc thần khi Hậu Nghệ đi săn vắng nhà.", scene: "Âm mưu" },

                    // --- PHẦN 2: SỰ LỰA CHỌN CỦA HẰNG NGA ---
                    { en: "One day, while Hou Yi was in the mountains, Peng Meng broke into their home.", vi: "Một ngày nọ, khi Hậu Nghệ đang ở trên núi, Phùng Mông đột nhập vào nhà họ.", scene: "Đột nhập" },
                    { en: "He pointed a sword at Chang'e and demanded the Elixir of Immortality.", vi: "Hắn chỉ kiếm vào Hằng Nga và đòi nộp thuốc trường sinh bất tử.", scene: "Đe dọa" },
                    { en: "Chang'e knew she could not defeat the wicked man by force.", vi: "Hằng Nga biết mình không thể dùng sức lực để đánh bại kẻ độc ác.", scene: "Nguy cấp" },
                    { en: "To prevent him from taking the elixir, she opened the bottle and drank it herself.", vi: "Để ngăn hắn lấy được thuốc, nàng đã mở lọ và tự mình uống hết.", scene: "Hy sinh" },
                    { en: "Immediately, Chang'e felt her body becoming light and floating off the ground.", vi: "Ngay lập tức, Hằng Nga cảm thấy cơ thể mình trở nên nhẹ bẫng và bay khỏi mặt đất.", scene: "Hóa tiên" },
                    { en: "She drifted out of the window and began to fly toward the starry sky.", vi: "Nàng trôi ra khỏi cửa sổ và bắt đầu bay về phía bầu trời đầy sao.", scene: "Bay lên" },
                    { en: "Because she loved her husband so much, she chose to fly to the nearest celestial body.", vi: "Vì quá yêu chồng, nàng đã chọn bay đến thiên thể gần nhất.", scene: "Quyết định" },
                    { en: "She landed on the Moon, where she became the Moon Goddess.", vi: "Nàng đáp xuống Mặt Trăng, nơi nàng trở thành Hằng Nga (Thần Mặt Trăng).", scene: "Cung trăng" },
                    { en: "A loyal Jade Rabbit accompanied her to the Moon Palace to keep her company.", vi: "Một chú Thỏ Ngọc trung thành đã đi cùng nàng đến Cung Quảng Hàn để bầu bạn.", scene: "Thỏ Ngọc" },
                    { en: "The Moon Palace was a cold and lonely place, but very beautiful.", vi: "Cung Quảng Hàn là một nơi lạnh lẽo và cô đơn, nhưng vô cùng xinh đẹp.", scene: "Cung Quảng Hàn" },

                    // --- PHẦN 3: NỖI NHỚ VÀ SỰ TÍCH TRUNG THU ---
                    { en: "When Hou Yi returned, he found the house empty and his wife gone.", vi: "Khi Hậu Nghệ trở về, chàng thấy ngôi nhà trống không và vợ mình đã biến mất.", scene: "Đau buồn" },
                    { en: "He looked up at the night sky and cried out Chang'e's name in despair.", vi: "Chàng nhìn lên bầu trời đêm và gọi tên Hằng Nga trong tuyệt vọng.", scene: "Tuyệt vọng" },
                    { en: "The moon that night was exceptionally round and bright.", vi: "Mặt trăng đêm đó tròn và sáng một cách lạ thường.", scene: "Trăng tròn" },
                    { en: "He saw a moving figure on the moon that looked exactly like his wife.", vi: "Chàng thấy một bóng người đang cử động trên trăng trông giống hệt vợ mình.", scene: "Nhìn thấy" },
                    { en: "Hou Yi set up an altar in the garden with Chang'e's favorite fruits and cakes.", vi: "Hậu Nghệ lập một bàn thờ trong vườn với những loại trái cây và bánh mà Hằng Nga thích.", scene: "Cúng trăng" },
                    { en: "People heard the story and began to offer sacrifices to the Moon Goddess for good luck.", vi: "Mọi người nghe chuyện và bắt đầu làm lễ cúng thần Mặt Trăng để cầu may mắn.", scene: "Lan truyền" },
                    { en: "This tradition became the Mid-Autumn Festival, celebrated every year.", vi: "Truyền thống này đã trở thành Tết Trung Thu, được tổ chức hàng năm.", scene: "Lễ hội" },
                    { en: "Children believe they can still see the Jade Rabbit making medicine on the moon.", vi: "Trẻ em tin rằng chúng vẫn có thể thấy Thỏ Ngọc đang giã thuốc trên mặt trăng.", scene: "Truyền thuyết" },
                    { en: "Chang'e remains a symbol of beauty, grace, and eternal longing.", vi: "Hằng Nga vẫn là biểu tượng của vẻ đẹp, sự duyên dáng và nỗi nhớ vĩnh cửu.", scene: "Biểu tượng" },
                    { en: "Her story is told during every full moon to remind us of true love.", vi: "Câu chuyện của nàng được kể vào mỗi đêm trăng tròn để nhắc nhở chúng ta về tình yêu đích thực.", scene: "Kết thúc" }
                ]
            },
            confuciusProphecy: {
                titleEn: "Confucius and the Emperor's Doom",
                titleVi: "Khổng Tử và Lời Tiên Tri",
                data: [
                    // --- PHẦN 1: SỰ RA ĐỜI CỦA VỊ THÁNH ---
                    { en: "When Confucius was born, a strange beast called the Kilin appeared on earth.", vi: "Khi Khổng Tử ra đời, một con quái thú kỳ lạ tên là Kỳ Lân đã xuất hiện trên thế gian.", scene: "Giáng sinh" },
                    { en: "The Kilin, prince of all animals, only appears when a great man is born.", vi: "Kỳ Lân, chúa tể của muôn thú, chỉ xuất hiện khi một vĩ nhân ra đời.", scene: "Điềm lành" },
                    { en: "The beast spat out a piece of jade with a mysterious prophecy written on it.", vi: "Con thú nhả ra một viên ngọc bích có khắc một lời tiên tri huyền bí.", scene: "Ngọc bích" },
                    { en: "It said that the child was destined to become an 'Uncrowned King'.", vi: "Nó nói rằng đứa trẻ định sẵn sẽ trở thành một 'Vị Vua Không Ngai'.", scene: "Lời tiên tri" },
                    { en: "Confucius grew up studying diligently and became a saint of great wisdom.", vi: "Khổng Tử lớn lên học tập chăm chỉ và trở thành một vị thánh có trí tuệ cao siêu.", scene: "Trưởng thành" },
                    { en: "He did much good on earth and was reverenced as the greatest of teachers.", vi: "Người đã làm nhiều việc thiện và được tôn vinh là bậc thầy vĩ đại nhất.", scene: "Vĩ nhân" },
                    { en: "The Saint had the power of foreknowledge, knowing things before they happened.", vi: "Vị Thánh có khả năng tiên tri, biết trước mọi việc trước khi chúng xảy ra.", scene: "Tiên tri" },
                    { en: "Even after his death, he left evidence of his mysterious powers.", vi: "Ngay cả sau khi qua đời, người vẫn để lại những minh chứng về quyền năng huyền bí của mình.", scene: "Bất tử" },

                    // --- PHẦN 2: SỰ XÂM PHẠM CỦA VỊ VUA ĐỘC ÁC ---
                    { en: "Centuries later, the wicked Emperor Tsin Schi Huang conquered all kingdoms.", vi: "Nhiều thế kỷ sau, vị vua độc ác Tần Thủy Hoàng đã chinh phục tất cả các vương quốc.", scene: "Chinh phạt" },
                    { en: "While traveling through the empire, he reached the homeland of the Saint.", vi: "Khi đi tuần du khắp đế chế, hắn đã đến quê hương của Vị Thánh.", scene: "Tuần du" },
                    { en: "The Emperor found the grave of Confucius and wished to open it.", vi: "Hoàng đế tìm thấy lăng mộ của Khổng Tử và muốn khai quật nó.", scene: "Ngông cuồng" },
                    { en: "His officials advised him not to disturb the Saint, but he would not listen.", vi: "Các quan lại khuyên hắn đừng mạo phạm Vị Thánh, nhưng hắn không nghe theo.", scene: "Cảnh báo" },
                    { en: "They dug a passage into the grave and found a fresh wooden coffin.", vi: "Họ đào một lối đi vào mộ và tìm thấy một chiếc quan tài gỗ còn rất mới.", scene: "Khai quật" },
                    { en: "When struck, the wood sounded like metal, echoing through the chamber.", vi: "Khi gõ vào, tiếng gỗ vang lên như tiếng kim loại, vang vọng khắp căn phòng.", scene: "Kỳ bí" },
                    { en: "Inside an inner chamber, they found a bed, books, and clothing.", vi: "Trong một căn phòng bên trong, họ tìm thấy một chiếc giường, sách và quần áo.", scene: "Mộ thất" },
                    { en: "Everything looked as though it was meant for a living person.", vi: "Mọi thứ trông như thể được chuẩn bị cho một người còn đang sống.", scene: "Sống động" },

                    // --- PHẦN 3: LỜI CẢNH BÁO CUỐI CÙNG ---
                    { en: "The Emperor sat on the bed and saw two shoes made of red silk.", vi: "Hoàng đế ngồi trên giường và thấy hai chiếc giày làm bằng lụa đỏ.", scene: "Tham lam" },
                    { en: "The shoes were adorned with beautiful woven patterns of clouds.", vi: "Đôi giày được trang trí bằng những hoa văn mây dệt tuyệt đẹp.", scene: "Giày đỏ" },
                    { en: "In jest, the Emperor put on the shoes and took a bamboo staff.", vi: "Để giễu cợt, Hoàng đế đã xỏ đôi giày vào và cầm lấy một cây gậy trúc.", scene: "Mạo phạm" },
                    { en: "As he left the grave, a mysterious tablet suddenly appeared before him.", vi: "Khi hắn rời khỏi mộ, một tấm bia huyền bí đột nhiên xuất hiện trước mặt.", scene: "Hiện hình" },
                    { en: "On the tablet was a poem predicting the Emperor's own death.", vi: "Trên tấm bia là một bài thơ tiên đoán về cái chết của chính vị Hoàng đế.", scene: "Bài thơ" },
                    { en: "'You steal my shoes to reach your last earthly day,' the poem warned.", vi: "'Ngươi trộm giày của ta để đi đến ngày cuối cùng trên trần thế,' bài thơ cảnh báo.", scene: "Lời nguyền" },
                    { en: "The poem even named the exact city where the Emperor would die.", vi: "Bài thơ thậm chí còn nêu đích danh thành phố nơi Hoàng đế sẽ băng hà.", scene: "Chính xác" },
                    { en: "Tsin Schi Huang was alarmed and ordered the grave to be closed.", vi: "Tần Thủy Hoàng hoảng sợ và ra lệnh đóng cửa lăng mộ lại.", scene: "Hoảng sợ" },
                    { en: "However, the Saint's prophecy could not be escaped.", vi: "Tuy nhiên, lời tiên tri của Vị Thánh là không thể tránh khỏi.", scene: "Định mệnh" },
                    { en: "When he reached the city of Schakiu, the Emperor fell ill with a fever.", vi: "Khi đến thành phố Sa Khâu, Hoàng đế đã mắc một trận sốt cấp tính.", scene: "Đổ bệnh" },
                    { en: "He died exactly as the poem in the grave had predicted.", vi: "Hắn qua đời đúng như những gì bài thơ trong mộ đã tiên đoán.", scene: "Ứng nghiệm" },
                    { en: "The world remembered the Saint's wisdom and his silent power.", vi: "Thế giới ghi nhớ trí tuệ và quyền năng lặng lẽ của Vị Thánh.", scene: "Ghi nhớ" },
                    { en: "Confucius remains the greatest teacher, an uncrowned king forever.", vi: "Khổng Tử mãi là bậc thầy vĩ đại nhất, một vị vua không ngai vĩnh cửu.", scene: "Tôn vinh" },
                    { en: "Even kings must bow before the truth and wisdom of the saints.", vi: "Ngay cả những vị vua cũng phải cúi đầu trước sự thật và trí tuệ của các bậc thánh nhân.", scene: "Kết thúc" }
                ]
            },
            theMiserKing: {
                titleEn: "The Miser King and the Duck Feathers",
                titleVi: "Vua Bủn Xỉn và Bộ Lông Vịt",
                data: [
                    // --- PHẦN 1: KẺ HÀ TIỆN TÊN VƯƠNG ---
                    { en: "In a village near Nanking, there lived a man named Wang.", vi: "Tại một ngôi làng gần Nam Kinh, có một người đàn ông tên là Vương.", scene: "Giới thiệu" },
                    { en: "He cared for nothing in the world but to eat good food and plenty of it.", vi: "Lão chẳng quan tâm đến điều gì trên đời ngoài việc được ăn ngon và ăn thật nhiều.", scene: "Tham ăn" },
                    { en: "Although he was not poor, he hated spending his own money.", vi: "Mặc dù không hề nghèo, lão lại cực kỳ ghét việc phải tiêu tiền của chính mình.", scene: "Hà tiện" },
                    { en: "People called him 'The Miser King' because of his stingy habits.", vi: "Mọi người gọi lão là 'Vua Bủn Xỉn' vì thói quen keo kiệt của lão.", scene: "Biệt danh" },
                    { en: "He loved eating at other people's tables where the food cost him nothing.", vi: "Lão thích ăn chực ở bàn ăn của người khác, nơi lão không tốn một xu nào.", scene: "Ăn chực" },
                    { en: "But when spending his own money, he only ate scraps and drank water.", vi: "Nhưng khi phải tiêu tiền mình, lão chỉ ăn đồ thừa và uống thật nhiều nước.", scene: "Khổ hạnh" },
                    { en: "One day, while lying by a stream, the Miser King began to feel very hungry.", vi: "Một ngày nọ, khi đang nằm bên bờ suối, Vua Bủn Xỉn bắt đầu cảm thấy rất đói.", scene: "Cơn đói" },
                    { en: "He saw a flock of fat ducks swimming in the river nearby.", vi: "Lão thấy một đàn vịt béo mập đang bơi lội dưới dòng sông gần đó.", scene: "Đàn vịt" },
                    { en: "The ducks belonged to a rich and honest neighbor named Mr. Lin.", vi: "Đàn vịt đó thuộc về một người hàng xóm giàu có và trung thực tên là Lâm.", scene: "Chủ nhân" },
                    { en: "'Oh, for a boiled duck!' the Miser King sighed to himself.", vi: "'Ôi, ước gì có một con vịt luộc!' Vua Bủn Xỉn thở dài tự nhủ.", scene: "Thèm thuồng" },

                    // --- PHẦN 2: VỤ TRỘM VÀ BỮA ĂN TỘI LỖI ---
                    { en: "He convinced himself that the gods had sent the ducks just for him.", vi: "Lão tự thuyết phục mình rằng các vị thần đã gửi đàn vịt này đến cho lão.", scene: "Tự huyễn" },
                    { en: "The Miser King caught one of the plump ducks and hid it under his garment.", vi: "Vua Bủn Xỉn bắt lấy một con vịt béo nhất và giấu nó dưới lớp áo rách.", scene: "Trộm vịt" },
                    { en: "He took it home joyfully and prepared it for a secret dinner.", vi: "Lão hân hoan mang nó về nhà và chuẩn bị cho một bữa tối bí mật.", scene: "Về nhà" },
                    { en: "He ate the whole duck, laughing at his own slyness and trickery.", vi: "Lão ăn sạch con vịt, cười đắc ý trước sự ranh mãnh và thủ đoạn của mình.", scene: "Chén sạch" },
                    { en: "'Mr. Lin will think a hawk carried it away,' he chuckled.", vi: "'Lâm sẽ nghĩ là diều hâu đã tha nó đi thôi,' lão cười khoái chí.", scene: "Đắc ý" },
                    { en: "He planned to steal all the other ducks in the coming weeks.", vi: "Lão còn định bụng sẽ trộm sạch những con vịt còn lại trong vài tuần tới.", scene: "Tham lam" },
                    { en: "That night, the Miser King went to bed feeling very happy and full.", vi: "Đêm đó, Vua Bủn Xỉn đi ngủ trong trạng thái vô cùng hạnh phúc và no nê.", scene: "Đi ngủ" },
                    { en: "However, at midnight, he was awakened by a strange and painful itching.", vi: "Tuy nhiên, vào nửa đêm, lão bị đánh thức bởi một cơn ngứa ngáy lạ lùng và đau đớn.", scene: "Thức giấc" },
                    { en: "His whole body felt like it was on fire, but he had no oil for his lamp.", vi: "Toàn thân lão cảm thấy như đang bốc cháy, nhưng lão lại không có dầu thắp đèn.", scene: "Cơn đau" },
                    { en: "He had to wait until dawn to see what was happening to his skin.", vi: "Lão phải đợi đến lúc bình minh để xem điều gì đang xảy ra với làn da của mình.", scene: "Chờ đợi" },

                    // --- PHẦN 3: LỜI NGUYỀN LÔNG VỊT ---
                    { en: "At early dawn, he stepped outside and saw red spots all over his body.", vi: "Lúc tảng sáng, lão bước ra ngoài và thấy những đốm đỏ khắp cơ thể.", scene: "Kinh hãi" },
                    { en: "Tiny duck feathers were sprouting from every single red spot.", vi: "Những chiếc lông vịt tí hon đang mọc ra từ mỗi đốm đỏ đó.", scene: "Mọc lông" },
                    { en: "The feathers grew larger and larger until they covered him from head to foot.", vi: "Lông mọc ngày càng dài cho đến khi phủ kín lão từ đầu đến chân.", scene: "Biến dạng" },
                    { en: "With a cry of horror, he tried to pull the feathers out by handfuls.", vi: "Trong tiếng hét kinh hoàng, lão cố dùng tay nhổ từng nắm lông ra.", scene: "Nhổ lông" },
                    { en: "But the faster he pulled them, the faster they grew back, longer and glossier.", vi: "Nhưng lão nhổ càng nhanh, chúng mọc lại càng lẹ, dài hơn và bóng mượt hơn.", scene: "Vô vọng" },
                    { en: "The pain was so great that he began to roll on the ground in despair.", vi: "Cơn đau lớn đến mức lão bắt đầu lăn lộn trên đất trong sự tuyệt vọng.", scene: "Quằn quại" },
                    { en: "'Am I to be changed into a bird?' he groaned in misery.", vi: "'Chẳng lẽ mình sắp biến thành một con chim sao?' lão rên rỉ khổ sở.", scene: "Than vãn" },
                    { en: "Finally, he fell into a troubled sleep and saw a Fairy in his dream.", vi: "Cuối cùng, lão chìm vào giấc ngủ chập chờn và thấy một vị Tiên trong mơ.", scene: "Gặp Tiên" },
                    { en: "The Fairy told him that his laziness and theft had brought this trouble.", vi: "Vị Tiên nói rằng thói lười biếng và trộm cắp đã mang lại rắc rối này cho lão.", scene: "Quở trách" },
                    { en: "He reminded Wang that his parents had died because he refused to work.", vi: "Tiên ông nhắc Vương rằng cha mẹ lão đã mất vì lão từ chối làm việc giúp họ.", scene: "Sự thật" },

                    // --- PHẦN 4: LIỀU THUỐC CỦA TIÊN ÔNG ---
                    { en: "The Miser King begged the Fairy to free him from the feathers.", vi: "Vua Bủn Xỉn cầu xin Tiên ông giải thoát lão khỏi bộ lông vịt.", scene: "Cầu xin" },
                    { en: "'I cannot free you,' said the Fairy, 'you must do it yourself.'", vi: "'Ta không thể giải thoát cho con,' Tiên ông nói, 'con phải tự mình làm điều đó.'", scene: "Chỉ dẫn" },
                    { en: "The Fairy said he must get Mr. Lin, the owner of the duck, to scold him.", vi: "Tiên ông bảo lão phải làm sao để ông Lâm, chủ con vịt, mắng lão một trận.", scene: "Liều thuốc" },
                    { en: "'The harder he scolds you, the sooner the feathers will fall out.'", vi: "'Ông ấy mắng con càng nặng, lông vịt sẽ càng nhanh rụng hết.'", scene: "Bí mật" },
                    { en: "The Miser King woke up and decided to go to Mr. Lin's house immediately.", vi: "Vua Bủn Xỉn thức dậy và quyết định đến nhà ông Lâm ngay lập tức.", scene: "Lên đường" },
                    { en: "He even took some money to pay for the stolen duck.", vi: "Lão còn mang theo một ít tiền để trả cho con vịt đã trộm.", scene: "Hối lỗi?" },
                    { en: "But on the way, his stingy nature began to take over again.", vi: "Nhưng trên đường đi, bản tính keo kiệt của lão lại bắt đầu trỗi dậy.", scene: "Do dự" },
                    { en: "He hated to part with his copper coins and didn't want to admit he was a thief.", vi: "Lão ghét việc phải rời xa những đồng xu của mình và không muốn thừa nhận mình là kẻ trộm.", scene: "Tiếc của" },
                    { en: "He thought of a trick to make Mr. Lin scold someone else instead.", vi: "Lão nghĩ ra một mưu mẹo để khiến ông Lâm mắng một người khác thay thế.", scene: "Mưu hèn" },
                    { en: "'I will tell him that old Sen stole the duck!' the Miser King thought.", vi: "'Mình sẽ bảo ông ấy rằng lão Sen đã trộm con vịt!' Vua Bủn Xỉn nghĩ thầm.", scene: "Vu khống" },

                    // --- PHẦN 5: SỰ TỬ TẾ CỦA NGƯỜI HÀNG XÓM ---
                    { en: "He reached Mr. Lin's house and began his sly conversation.", vi: "Lão đến nhà ông Lâm và bắt đầu cuộc trò chuyện ranh mãnh của mình.", scene: "Gặp gỡ" },
                    { en: "Mr. Lin was an honest man who never spoke ill of his neighbors.", vi: "Ông Lâm là một người trung thực, chẳng bao giờ nói xấu hàng xóm láng giềng.", scene: "Nhân hậu" },
                    { en: "Wang told Lin that a duck was missing and suggested that old Sen took it.", vi: "Vương bảo Lâm rằng một con vịt đã mất và gợi ý rằng lão Sen đã lấy nó.", scene: "Đâm thọc" },
                    { en: "To Wang's surprise, Mr. Lin was not angry at all.", vi: "Trước sự ngạc nhiên của Vương, ông Lâm chẳng hề tức giận chút nào.", scene: "Bất ngờ" },
                    { en: "Instead, Mr. Lin felt sorry for Sen and offered to help him.", vi: "Thay vào đó, ông Lâm cảm thấy thương cho Sen và muốn giúp đỡ ông ấy.", scene: "Tử tế" },
                    { en: "'I would have given him the duck if he had only asked,' said Lin.", vi: "'Tôi đã sẵn lòng tặng ông ấy con vịt nếu ông ấy hỏi mượn,' Lâm nói.", scene: "Khoan dung" },
                    { en: "The Miser King was frustrated because Mr. Lin refused to scold anyone.", vi: "Vua Bủn Xỉn nản lòng vì ông Lâm từ chối mắng nhiếc bất cứ ai.", scene: "Thất vọng" },
                    { en: "Suddenly, the itching became so unbearable that Wang fell to the floor.", vi: "Đột nhiên, cơn ngứa trở nên không thể chịu nổi khiến Vương ngã gục xuống sàn.", scene: "Ngứa ngáy" },
                    { en: "He realized that he could not hide the truth any longer.", vi: "Lão nhận ra rằng mình không thể che giấu sự thật thêm được nữa.", scene: "Thú nhận" },
                    { en: "'I stole your duck!' he cried out, bowing in the dirt.", vi: "'Tôi đã trộm vịt của ông!' lão gào lên, cúi lạy dưới nền đất.", scene: "Tự thú" },

                    // --- PHẦN 6: TRẬN MẮNG GIẢI NGÔN ---
                    { en: "Wang showed Mr. Lin the thick growth of feathers covering his body.", vi: "Vương cho ông Lâm xem lớp lông vịt dày đặc đang phủ kín cơ thể lão.", scene: "Bằng chứng" },
                    { en: "Mr. Lin burst into a roar of laughter, thinking it was a funny story.", vi: "Ông Lâm phá lên cười sảng khoái, nghĩ rằng đó là một câu chuyện hài hước.", scene: "Tiếng cười" },
                    { en: "The Miser King begged and kowtowed, asking Lin to scold him hard.", vi: "Vua Bủn Xỉn van xin và dập đầu, yêu cầu Lâm hãy mắng lão thật nặng lời.", scene: "Van nài" },
                    { en: "Lin was a kind man and found it very difficult to use strong language.", vi: "Lâm là một người tốt và thấy rất khó khăn khi phải dùng lời lẽ nặng nề.", scene: "Ngần ngại" },
                    { en: "But Wang kept grabbing Lin's legs, screaming for a scolding.", vi: "Nhưng Vương cứ ôm chặt lấy chân Lâm, gào thét đòi được mắng.", scene: "Ép buộc" },
                    { en: "Finally, Mr. Lin lost his patience and began to shout at the miser.", vi: "Cuối cùng, ông Lâm mất kiên nhẫn và bắt đầu quát mắng kẻ hà tiện.", scene: "Nổi giận" },
                    { en: "'You lazy hound! You good-for-nothing creature!' Lin yelled.", vi: "'Đồ chó lười! Đồ sinh vật vô dụng!' Lâm hét lên.", scene: "Mắng nhiếc" },
                    { en: "As soon as the harsh words were spoken, the feathers began to fall off.", vi: "Ngay khi những lời nặng nề được thốt ra, lông vịt bắt đầu rụng xuống.", scene: "Phép màu" },
                    { en: "A great pile of feathers accumulated on the floor around them.", vi: "Một đống lông lớn tích tụ trên sàn nhà xung quanh họ.", scene: "Rụng lông" },
                    { en: "The dreadful itching stopped, and Wang felt light and free again.", vi: "Cơn ngứa khủng khiếp dừng lại, và Vương cảm thấy nhẹ nhõm, tự do trở lại.", scene: "Giải thoát" },

                    // --- PHẦN 7: SỰ THAY ĐỔI CỦA VUA BỦN XỈN ---
                    { en: "The Miser King thanked Mr. Lin for the 'splendid set of scold-words'.", vi: "Vua Bủn Xỉn cảm ơn ông Lâm vì 'loạt lời mắng nhiếc tuyệt vời'.", scene: "Biết ơn" },
                    { en: "He paid for the duck and left the feathers as a gift for Lin.", vi: "Lão trả tiền con vịt và để lại đống lông như một món quà cho Lâm.", scene: "Sửa đổi" },
                    { en: "Wang realized that his lazy and stingy life had been a mistake.", vi: "Vương nhận ra rằng cuộc đời lười biếng và keo kiệt của lão là một sai lầm.", scene: "Tỉnh ngộ" },
                    { en: "He promised to work hard and become a better man from that day on.", vi: "Lão hứa sẽ làm việc chăm chỉ và trở thành một người tốt hơn kể từ ngày đó.", scene: "Quyết tâm" },
                    { en: "He stopped being a miser and started helping others in the village.", vi: "Lão không còn bủn xỉn nữa và bắt đầu giúp đỡ những người khác trong làng.", scene: "Thay đổi" },
                    { en: "The villagers no longer laughed at him, but respected his hard work.", vi: "Dân làng không còn cười nhạo lão, mà tôn trọng sự chăm chỉ của lão.", scene: "Tôn trọng" },
                    { en: "The 'Miser King' had finally learned the value of honesty.", vi: "'Vua Bủn Xỉn' cuối cùng đã học được giá trị của lòng trung thực.", scene: "Giá trị" },
                    { en: "He married and lived a happy, productive life with his family.", vi: "Lão kết hôn và sống một cuộc đời hạnh phúc, hữu ích bên gia đình.", scene: "Hạnh phúc" },
                    { en: "The memory of the duck feathers kept him from ever being lazy again.", vi: "Ký ức về những chiếc lông vịt đã giúp lão không bao giờ lười biếng nữa.", scene: "Nhắc nhở" },
                    { en: "True wealth is not in gold, but in a clean heart and a busy hand.", vi: "Giàu sang thực sự không nằm ở vàng bạc, mà ở một trái tim trong sạch và đôi tay siêng năng.", scene: "Bài học" },

                    // --- PHẦN 8: TỔNG KẾT VÀ SUY NGẪM ---
                    { en: "Honesty is the best medicine for a sick soul.", vi: "Trung thực là liều thuốc tốt nhất cho một tâm hồn bệnh tật.", scene: "Suy ngẫm 1" },
                    { en: "Hard work brings more joy than stolen food ever could.", vi: "Lao động chăm chỉ mang lại nhiều niềm vui hơn bất kỳ món ăn trộm cắp nào.", scene: "Suy ngẫm 2" },
                    { en: "A kind neighbor is worth more than a hoard of hidden copper.", vi: "Một người hàng xóm tốt bụng đáng giá hơn cả một kho tiền đồng giấu kín.", scene: "Suy ngẫm 3" },
                    { en: "Conscience is a mirror that shows us our true feathers.", vi: "Lương tâm là tấm gương soi cho chúng ta thấy những 'chiếc lông' thực sự của mình.", scene: "Suy ngẫm 4" },
                    { en: "Do not wait for a curse to start living a virtuous life.", vi: "Đừng đợi đến khi bị nguyền rủa mới bắt đầu sống một cuộc đời đức hạnh.", scene: "Lời khuyên 1" },
                    { en: "Greed only leads to a heavy heart and a painful skin.", vi: "Tham lam chỉ dẫn đến một trái tim nặng nề và một làn da đau đớn.", scene: "Lời khuyên 2" },
                    { en: "The Fairy Old Boy watches over those who are willing to change.", vi: "Tiên ông luôn dõi theo những ai sẵn lòng thay đổi bản thân.", scene: "Thần tiên" },
                    { en: "Every mistake is a chance to grow wiser and stronger.", vi: "Mỗi sai lầm là một cơ hội để trở nên khôn ngoan và mạnh mẽ hơn.", scene: "Trưởng thành" },
                    { en: "The stars shine on those who work with a smile.", vi: "Những vì sao luôn tỏa sáng cho những ai lao động với nụ cười trên môi.", scene: "Ánh sáng" },
                    { en: "And so, the story of the Duck Feathers is told to this day.", vi: "Và cứ thế, câu chuyện về Bộ Lông Vịt vẫn được kể lại cho đến ngày nay.", scene: "Kết thúc" }
                ]
            },
            lusanHeaven: {
                titleEn: "Lu-san, Daughter of Heaven",
                titleVi: "Lục San, Con Gái Của Trời",
                data: [
                    // --- PHẦN 1: CUỘC SỐNG KHỔ CỰC TRÊN THUYỀN ---
                    { en: "Lu-san was a little girl who lived on a small houseboat with her family.", vi: "Lục San là một cô bé sống trên một chiếc thuyền chài nhỏ cùng gia đình.", scene: "Giới thiệu" },
                    { en: "Her father was a poor fisherman, but he was also ignorant and cruel.", vi: "Cha cô là một ngư dân nghèo, nhưng ông ta cũng là kẻ ngu muội và độc ác.", scene: "Người cha" },
                    { en: "He had no love for his children and often threatened to drown them all.", vi: "Ông ta không có tình thương với con cái và thường xuyên đe dọa sẽ dìm chết tất cả.", scene: "Đe dọa" },
                    { en: "Even her mother was unkind, often beating Lu-san without mercy.", vi: "Ngay cả mẹ cô cũng chẳng tử tế gì, bà thường xuyên đánh đập Lục San không thương tiếc.", scene: "Người mẹ" },
                    { en: "Lu-san's only treasure was a tiny soapstone image of the goddess Kwan-yin.", vi: "Báu vật duy nhất của Lục San là một bức tượng nhỏ bằng đá xà phòng hình Quan Âm Bồ Tát.", scene: "Báu vật" },
                    { en: "One night, Lu-san overheard her parents planning to get rid of her.", vi: "Một đêm nọ, Lục San tình cờ nghe thấy cha mẹ đang bàn kế hoạch tống khứ cô đi.", scene: "Âm mưu" },
                    { en: "'We will wait until the moon has set, then the girl goes down,' her father said.", vi: "'Chúng ta sẽ đợi trăng lặn, rồi con bé sẽ phải xuống nước,' người cha nói.", scene: "Nguy hiểm" },
                    { en: "Terrified, Lu-san decided to flee from the boat to save her life.", vi: "Quá kinh hãi, Lục San quyết định bỏ trốn khỏi con thuyền để cứu mạng mình.", scene: "Chạy trốn" },
                    { en: "She climbed the ladder silently, carrying only her precious stone image.", vi: "Cô lặng lẽ leo lên thang, chỉ mang theo bức tượng đá quý giá của mình.", scene: "Lặng lẽ" },
                    { en: "She stepped onto the dark shore, ready to go out into the big world alone.", vi: "Cô bước lên bờ sông tối tăm, sẵn sàng một mình dấn thân vào thế giới rộng lớn.", scene: "Lên bờ" },

                    // --- PHẦN 2: CUỘC GẶP GỠ TRÊN BỜ SÔNG ---
                    { en: "Lu-san ran as fast as her little legs could carry her away from the water.", vi: "Lục San chạy nhanh hết mức có thể để rời xa dòng nước.", scene: "Chạy đi" },
                    { en: "She reached the open fields and fell in a heap on the sand, exhausted.", vi: "Cô chạy đến những cánh đồng trống và ngã gục trên cát vì kiệt sức.", scene: "Kiệt sức" },
                    { en: "She whispered a prayer to Kwan-yin and fell into a deep sleep.", vi: "Cô thì thầm một lời cầu nguyện tới Quan Âm và chìm vào giấc ngủ sâu.", scene: "Cầu nguyện" },
                    { en: "When she awoke, a beautiful lady dressed like a princess was bending over her.", vi: "Khi thức dậy, một quý bà xinh đẹp mặc đồ như công chúa đang cúi xuống nhìn cô.", scene: "Tiên nữ" },
                    { en: "The lady had the fairest face and most perfect features Lu-san had ever seen.", vi: "Quý bà có gương mặt thanh tú và những đường nét hoàn hảo nhất mà Lục San từng thấy.", scene: "Vẻ đẹp" },
                    { en: "Lu-san offered her soapstone image, thinking the lady must have lost it.", vi: "Lục San dâng bức tượng đá của mình, nghĩ rằng quý bà hẳn đã làm rơi nó.", scene: "Sự thật thà" },
                    { en: "'It is the goddess Kwan-yin,' the child said, 'she who makes children happy.'", vi: "'Đây là Quan Âm Bồ Tát,' đứa trẻ nói, 'Người mang lại hạnh phúc cho trẻ nhỏ.'", scene: "Trao tặng" },
                    { en: "The beautiful lady embraced Lu-san tightly, and a tear fell from her eye.", vi: "Quý bà xinh đẹp ôm chặt Lục San, và một giọt nước mắt rơi từ mắt bà.", scene: "Cảm động" },
                    { en: "The tear touched Lu-san's head as she fell asleep in the lady's arms.", vi: "Giọt nước mắt chạm vào đầu Lục San khi cô ngủ thiếp đi trong vòng tay bà.", scene: "Phép màu" },
                    { en: "Lu-san felt a warmth and love she had never known in her entire life.", vi: "Lục San cảm thấy một sự ấm áp và tình yêu mà cô chưa từng biết trong đời.", scene: "Tình thương" },

                    // --- PHẦN 3: SỰ THAY ĐỔI KỲ DIỆU ---
                    { en: "When Lu-san awoke, she was back on the houseboat, but everything felt different.", vi: "Khi Lục San tỉnh dậy, cô đã ở lại trên thuyền, nhưng mọi thứ cảm thấy thật khác lạ.", scene: "Tỉnh giấc" },
                    { en: "Her parents were speaking in low, gentle voices instead of their usual shouts.", vi: "Cha mẹ cô đang nói chuyện bằng giọng thấp, nhẹ nhàng thay vì những tiếng quát tháo thường ngày.", scene: "Thay đổi" },
                    { en: "Her father told her mother about a strange light he saw around Lu-san's face.", vi: "Người cha kể với người mẹ về một luồng sáng lạ ông thấy quanh mặt Lục San.", scene: "Kể chuyện" },
                    { en: "A voice had whispered to him, 'Would you hurt a daughter of the gods?'", vi: "Một giọng nói đã thì thầm với ông: 'Ngươi định làm hại một người con của thần sao?'", scene: "Cảnh báo" },
                    { en: "The parents were struck with fear and realized how wicked they had been.", vi: "Cha mẹ cô run rẩy sợ hãi và nhận ra họ đã từng độc ác đến mức nào.", scene: "Hối hận" },
                    { en: "Lu-san found beautiful silk garments and satin slippers waiting for her.", vi: "Lục San tìm thấy những bộ đồ lụa tuyệt đẹp và đôi hài gấm đang đợi mình.", scene: "Quà tặng" },
                    { en: "Her rough, work-worn hands had become soft, smooth, and shapely.", vi: "Đôi bàn tay thô ráp vì làm việc nặng của cô nay trở nên mềm mại và thanh tú.", scene: "Biến đổi" },
                    { en: "The old, dirty houseboat had transformed into a magnificent, stately ship.", vi: "Chiếc thuyền chài cũ bẩn đã biến thành một con tàu lộng lẫy và uy nghi.", scene: "Con tàu thần" },
                    { en: "The ragged sail was now a beautiful sheet of canvas floating in the breeze.", vi: "Cánh buồm rách nát nay là một dải vải bạt tuyệt đẹp bay trong gió.", scene: "Cánh buồm" },
                    { en: "Everything Lu-san touched seemed to change as if by magic.", vi: "Mọi thứ Lục San chạm vào dường như đều thay đổi như có phép màu.", scene: "Phép thuật" },

                    // --- PHẦN 4: LÒNG VỊ THA CỦA LỤC SAN ---
                    { en: "Lu-san found her parents trembling in a corner, wearing their usual rags.", vi: "Lục San thấy cha mẹ đang run rẩy trong góc, vẫn mặc những bộ đồ rách rưới cũ.", scene: "Gặp lại" },
                    { en: "They bowed before her, thinking she was a goddess from another world.", vi: "Họ cúi lạy trước cô, nghĩ rằng cô là một vị nữ thần từ thế giới khác.", scene: "Kính sợ" },
                    { en: "Lu-san touched her father's shoulder and told him not to be afraid.", vi: "Lục San chạm vào vai cha và bảo ông đừng sợ hãi.", scene: "Vỗ về" },
                    { en: "She forgave them for all the pain they had caused her in the past.", vi: "Cô tha thứ cho họ vì tất cả những nỗi đau mà họ đã gây ra cho cô trước đây.", scene: "Vị tha" },
                    { en: "'As the Goddess of Mercy has favored me, I bestow her love on you,' she said.", vi: "'Vì Quan Âm Bồ Tát đã ban phước cho con, con xin trao tình thương của Người cho cha mẹ,' cô nói.", scene: "Ban phước" },
                    { en: "She told her brothers to speak no more angry words to one another.", vi: "Cô bảo các anh trai mình đừng bao giờ nói lời giận dữ với nhau nữa.", scene: "Dạy bảo" },
                    { en: "The family began to live in peace and happiness on the magic ship.", vi: "Gia đình bắt đầu sống trong hòa bình và hạnh phúc trên con tàu thần kỳ.", scene: "Hạnh phúc" },
                    { en: "Whenever they cast their nets, they drew back the choicest fish.", vi: "Mỗi khi họ quăng lưới, họ đều kéo lên được những con cá ngon nhất.", scene: "Thu hoạch" },
                    { en: "Lu-san became known as the richest and kindest person in the country.", vi: "Lục San trở nên nổi tiếng là người giàu có và nhân hậu nhất vùng.", scene: "Danh tiếng" },
                    { en: "The family learned that only love and kindness must rule their lives.", vi: "Cả gia đình học được rằng chỉ có tình yêu và sự tử tế mới nên làm chủ cuộc sống của họ.", scene: "Bài học" },

                    // --- PHẦN 5: NGÀY HÓA TIÊN ---
                    { en: "One day, during the Second Moon, it was the birthday of Kwan-yin.", vi: "Một ngày nọ, vào tháng Hai âm lịch, đó là ngày sinh nhật của Quan Âm.", scene: "Lễ hội" },
                    { en: "The family went to the temple to give the goddess honor.", vi: "Cả gia đình đến đền thờ để tôn vinh vị nữ thần.", scene: "Đi lễ" },
                    { en: "Suddenly, a strange object appeared in the distant western sky.", vi: "Đột nhiên, một vật thể lạ xuất hiện trên bầu trời phía tây xa xăm.", scene: "Điềm lạ" },
                    { en: "A flight of white doves was drawing a wonderful chair through the air.", vi: "Một đàn bồ câu trắng đang kéo một chiếc ghế tuyệt đẹp bay qua không trung.", scene: "Xe kéo chim" },
                    { en: "The chair was made of white and gold, more dazzling than a throne.", vi: "Chiếc ghế được làm từ vàng và trắng, rực rỡ hơn cả một ngai vàng.", scene: "Kiệu thần" },
                    { en: "The doves lowered the magic chair until it was right in front of Lu-san.", vi: "Đàn bồ câu hạ chiếc ghế thần xuống cho đến khi nó dừng ngay trước mặt Lục San.", scene: "Đón rước" },
                    { en: "A shower of pure white lilies fell about her feet from the sky.", vi: "Một cơn mưa hoa huệ trắng tinh khôi rơi xuống chân cô từ bầu trời.", scene: "Mưa hoa" },
                    { en: "Lu-san stepped into the fairy car and waved farewell to her family.", vi: "Lục San bước vào cỗ xe tiên và vẫy tay chào tạm biệt gia đình mình.", scene: "Tạm biệt" },
                    { en: "A voice from the clouds spoke in music: 'Kwan-yin rewards Lu-san.'", vi: "Một giọng nói từ những đám mây vang lên như âm nhạc: 'Quan Âm ban thưởng cho Lục San.'", scene: "Tiếng trời" },
                    { en: "'The tear from Kwan-yin's eye touched the hearts of those who loved you not.'", vi: "'Giọt nước mắt từ mắt Quan Âm đã chạm đến trái tim của những kẻ từng không yêu thương con.'", scene: "Giải thích" },

                    // --- PHẦN 6: BIẾN THÀNH NGÔI SAO ---
                    { en: "Lu-san began to rise into the Western Heaven among the fairies.", vi: "Lục San bắt đầu bay lên Tây Phương Cực Lạc giữa những nàng tiên.", scene: "Thăng thiên" },
                    { en: "A rosy light surrounded her flying car as she disappeared into the sky.", vi: "Một luồng sáng hồng bao quanh cỗ xe khi cô biến mất vào bầu trời.", scene: "Ánh hồng" },
                    { en: "It seemed as if heaven's gates were opening to receive her.", vi: "Dường như cổng trời đang mở ra để đón nhận cô.", scene: "Cổng trời" },
                    { en: "The people on earth watched in wonder, their eyes wet with tears.", vi: "Người dân dưới mặt đất dõi theo trong sự kinh ngạc, mắt họ đẫm lệ.", scene: "Kinh ngạc" },
                    { en: "Lu-san became a bright star within the azure realms above.", vi: "Lục San đã trở thành một ngôi sao sáng trong cõi xanh thẳm phía trên.", scene: "Ngôi sao" },
                    { en: "Her story reminds us that goodness can spring even from the dust.", vi: "Câu chuyện của cô nhắc nhở chúng ta rằng lòng tốt có thể nảy nở ngay cả từ bụi cát.", scene: "Ý nghĩa" },
                    { en: "Love has the power to soften the hardest and most cruel hearts.", vi: "Tình yêu có sức mạnh làm mềm lòng cả những trái tim cứng rắn và độc ác nhất.", scene: "Sức mạnh tình yêu" },
                    { en: "Lu-san, the Daughter of Heaven, is never forgotten.", vi: "Lục San, người con gái của Trời, sẽ không bao giờ bị lãng quên.", scene: "Vĩnh cửu" },
                    { en: "The Goddess of Mercy always listens to the prayers of the suffering.", vi: "Quan Âm Bồ Tát luôn lắng nghe lời cầu nguyện của những người đau khổ.", scene: "Niềm tin" },
                    { en: "May every heart find the peace that Lu-san brought to her world.", vi: "Cầu mong mọi trái tim đều tìm thấy sự bình an mà Lục San đã mang đến cho thế giới của cô.", scene: "Kết thúc" },

                    // --- CÁC THẺ BỔ SUNG ĐỂ ĐỦ 80 THẺ (Gợi ý thêm từ nội dung) ---
                    { en: "The soapstone image was the only plaything of her childhood.", vi: "Bức tượng đá xà phòng là đồ chơi duy nhất trong tuổi thơ của cô.", scene: "Kỷ niệm" },
                    { en: "She found it one day while walking in the sand near the river.", vi: "Cô tìm thấy nó một ngày nọ khi đang đi dạo trên cát gần bờ sông.", scene: "Tìm thấy" },
                    { en: "Lu-san had often listened to stories of Kwan-yin from an old priest.", vi: "Lục San thường nghe những câu chuyện về Quan Âm từ một vị sư già.", scene: "Học hỏi" },
                    { en: "The Goddess of Mercy is known as the best friend of children.", vi: "Quan Âm Bồ Tát được biết đến là người bạn tốt nhất của trẻ nhỏ.", scene: "Quan Âm" },
                    { en: "Dark memories filled Lu-san's mind as she fled past the houses.", vi: "Những ký ức đen tối lấp đầy tâm trí Lục San khi cô chạy qua những ngôi nhà.", scene: "Ký ức" },
                    { en: "She feared the river dwellers who did many dreadful deeds.", vi: "Cô sợ những người sống trên sông, những kẻ đã làm nhiều việc khủng khiếp.", scene: "Nỗi sợ" },
                    { en: "But the bright land and sunshine called to her heart.", vi: "Nhưng vùng đất tươi sáng và ánh nắng mặt trời đã vẫy gọi trái tim cô.", scene: "Hy vọng" },
                    { en: "A huge boat dog barked at her, but she did not stop running.", vi: "Một con chó thuyền to lớn sủa vào cô, nhưng cô không ngừng chạy.", scene: "Thử thách" },
                    { en: "She preferred the unknown world over the death her parents planned.", vi: "Cô thà chọn thế giới xa lạ còn hơn là cái chết mà cha mẹ đã định sẵn.", scene: "Lựa chọn" },
                    { en: "The city was full of thousands of sleepers, but none were her friends.", vi: "Thành phố đầy rẫy hàng ngàn người đang ngủ, nhưng chẳng ai là bạn cô.", scene: "Cô đơn" },
                    { en: "The mysterious princess in her dream was actually the goddess herself.", vi: "Quý bà huyền bí trong giấc mơ thực chất chính là vị nữ thần.", scene: "Tiết lộ" },
                    { en: "The lily flowers symbolize the purity of Lu-san's soul.", vi: "Những bông hoa huệ tượng trưng cho sự thuần khiết trong tâm hồn Lục San.", scene: "Biểu tượng" },
                    { en: "The father's hands hung limp when he tried to touch the girl.", vi: "Đôi tay người cha buông thõng khi ông cố chạm vào cô bé.", scene: "Trừng phạt" },
                    { en: "Insulting a daughter of the gods brings a thousand blows from Yama.", vi: "Xúc phạm một người con của thần linh sẽ bị Diêm Vương trừng phạt nghìn lần.", scene: "Luật quả" },
                    { en: "The magic ship moved up and down the river with invisible sailors.", vi: "Con tàu thần kỳ di chuyển ngược xuôi dòng sông với những thủy thủ vô hình.", scene: "Thủy thủ" },
                    { en: "The Second Moon is a time of rebirth and celebration of the divine.", vi: "Tháng Hai là thời gian của sự tái sinh và tôn vinh thần linh.", scene: "Thời gian" },
                    { en: "Doves with silken ribbons guided Lu-san toward her destiny.", vi: "Những con bồ câu với dải ruy băng lụa đã dẫn lối Lục San đến định mệnh.", scene: "Dẫn lối" },
                    { en: "The Western Heaven is a realm of eternal light and joy.", vi: "Tây Phương Cực Lạc là cõi của ánh sáng và niềm vui vĩnh cửu.", scene: "Thiên đường" },
                    { en: "Her parents' faces became softened as they grew in wisdom.", vi: "Khuôn mặt cha mẹ cô trở nên hiền hậu hơn khi họ dần trở nên khôn ngoan.", scene: "Tu tâm" },
                    { en: "Goodness is a treasure that no one can ever take away.", vi: "Lòng tốt là một kho báu mà không ai có thể lấy đi được.", scene: "Chân lý" }
                ]
            }
        };

        const synth = window.speechSynthesis;
        const voiceSelect = document.getElementById('voice-select');
        let voices = [];
        let currentStoryData = [];

        function loadVoices() {
            voices = synth.getVoices().filter(v => v.lang.includes('en'));
            voiceSelect.innerHTML = voices.map((v, i) => `<option value="${i}">${v.name}</option>`).join('');
        }
        synth.onvoiceschanged = loadVoices;

        function speak(text) {
            synth.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            if (voices[voiceSelect.value]) utterance.voice = voices[voiceSelect.value];
            synth.speak(utterance);
        }

        // HÀM QUAN TRỌNG: LOAD TRUYỆN THEO LỰA CHỌN
        function loadStory(storyKey) {
            const story = allStories[storyKey];
            if (!story) return;

            document.getElementById('main-title').innerText = story.titleEn;
            document.getElementById('sub-title').innerText = story.titleVi;

            const gallery = document.getElementById('gallery');
            gallery.innerHTML = '<div class="snap-spacer"></div><div class="snap-spacer"></div>';
            const spacerAfter = gallery.querySelector('.snap-spacer:last-child');

            currentStoryData = story.data;

            currentStoryData.forEach((item, i) => {
                const card = document.createElement('div');
                card.className = 'flashcard';
                card.dataset.index = i;
                card.innerHTML = `
                    <div class="card-inner">
                        <div class="card-front">
                            <div class="type-tag">${item.scene}</div>
                            <div class="english">${item.en}</div>
                            <div class="audio-icon" onclick="event.stopPropagation(); speak('${item.en.replace(/'/g, "\\'")}')">
                                <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
                            </div>
                        </div>
                        <div class="card-back">
                            <div class="type-tag">Dịch Nghĩa</div>
                            <div class="vietnamese">${item.vi}</div>
                        </div>
                    </div>
                `;

                card.onclick = () => {
                    if (card.classList.contains('active')) {
                        card.classList.toggle('flipped');
                    } else {
                        card.scrollIntoView({ behavior: 'smooth', inline: 'center' });
                    }
                };

                gallery.insertBefore(card, spacerAfter);
                observer.observe(card);
            });

            document.getElementById('card-counter').innerText = `1 / ${currentStoryData.length}`;
            gallery.scrollLeft = 0;
        }

        // XỬ LÝ DI CHUYỂN
        window.moveSlide = (direction) => {
            const cards = document.querySelectorAll('.flashcard');
            const currentActive = document.querySelector('.flashcard.active');
            let nextIndex = 0;
            if (currentActive) nextIndex = parseInt(currentActive.dataset.index) + direction;
            if (nextIndex >= 0 && nextIndex < cards.length) {
                cards[nextIndex].scrollIntoView({ behavior: 'smooth', inline: 'center' });
            }
        };

        // OBSERVER ĐỂ THEO DÕI THẺ ĐANG XEM
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                    document.getElementById('card-counter').innerText = `${parseInt(entry.target.dataset.index) + 1} / ${currentStoryData.length}`;
                } else {
                    entry.target.classList.remove('active', 'flipped');
                }
            });
        }, { root: document.getElementById('gallery'), threshold: 0.7 });

        // HIỆU ỨNG SAO BAY (Giữ nguyên của bạn)
        const canvas = document.getElementById('stars-canvas');
        const ctx = canvas.getContext('2d');
        let stars = [];
        function initCanvas() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            stars = [];
            for (let i = 0; i < 60; i++) {
                stars.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, size: Math.random() * 1.5, opacity: Math.random(), speed: 0.01 });
            }
        }
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            stars.forEach(s => {
                s.opacity += s.speed; if (s.opacity > 1 || s.opacity < 0.2) s.speed = -s.speed;
                ctx.fillStyle = `rgba(255, 255, 255, ${s.opacity})`;
                ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2); ctx.fill();
            });
            requestAnimationFrame(animate);
        }

        window.onload = () => {
            initCanvas();
            animate();
            loadVoices();

            // Tự động tạo danh sách truyện từ allStories
            const selector = document.getElementById('story-selector');
            selector.innerHTML = Object.keys(allStories).map(key =>
                `<option value="${key}">${allStories[key].titleEn} (${allStories[key].titleVi})</option>`
            ).join('');

            loadStory('snowWhite');
        };
        window.addEventListener('resize', initCanvas);
    </script>
</body>

</html>
