    <title>Endless Alphabet</title>

    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Endless Alphabet">

    <style>
        /* Chống kéo trang gây giật lag trên điện thoại */
        html,
        body {
            overflow: hidden;
            height: 100%;
            position: fixed;
            width: 100%;
            -webkit-overflow-scrolling: touch;
        }

        :root {
            --glass-bg: rgba(255, 255, 255, 0.1);
            --neon-blue: #00f2ff;
            --neon-pink: #ff007f;
            --card-radius: 24px;
            --border-glow: rgba(255, 255, 255, 0.2);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            /* Chặn chọn văn bản khi đang kéo thả chữ */
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            font-family: 'Exo 2', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            touch-action: none;
            color: #ffffff;
            position: relative;
            background-color: #f0f2f5;
        }

        /* --- Kỹ thuật chuyển nền Seamless --- */
        #bg-static,
        #bg-transition {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            transition: opacity 3s ease-in-out;
        }

        #bg-static {
            opacity: 1;
        }

        #bg-transition {
            opacity: 0;
        }

        /* Lưới điện tử mờ */
        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
            pointer-events: none;
        }

        #effect-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
        }

        #bg-animation-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            overflow: hidden;
        }

        .bg-object {
            position: absolute;
            font-size: 5rem;
            opacity: 0;
            filter: blur(1px);
            animation: float-around 20s linear infinite;
        }

        @keyframes float-around {
            0% {
                transform: translate(0, 0) rotate(0deg);
                opacity: 0;
            }

            10% {
                opacity: 0.2;
            }

            90% {
                opacity: 0.2;
            }

            100% {
                transform: translate(var(--move-x), var(--move-y)) rotate(360deg);
                opacity: 0;
            }
        }

        #game-header {
            text-align: center;
            margin-bottom: 10px;
            z-index: 10;
            position: relative;
        }

        h1 {
            font-size: 3rem;
            margin: 0;
            font-weight: 900;
            background: linear-gradient(180deg, #fff 0%, #00f2ff 100%);

            /* Dòng fix lỗi màu vàng đây ông nhé */
            -webkit-background-clip: text;
            background-clip: text;

            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(0, 242, 255, 0.5));
            letter-spacing: 4px;
            text-transform: uppercase;
            font-style: italic;
        }

        #word-meaning {
            font-size: 1.5rem;
            color: #fff;
            text-transform: uppercase;
            margin-bottom: 10px;
            font-weight: 900;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        #word-container {
            display: flex;
            gap: 10px;
            margin: 15px 0 30px 0;
            background: var(--glass-bg);
            padding: 20px;
            border-radius: 40px;
            border: 2px solid var(--border-glow);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(15px);
            flex-wrap: wrap;
            justify-content: center;
            z-index: 10;
        }

        .letter-slot {
            width: 65px;
            height: 85px;
            border: 2px dashed rgba(255, 255, 255, 0.3);
            background: rgba(0, 0, 0, 0.2);
            border-radius: var(--card-radius);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.1);
        }

        .letter-pool {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 20px;
            width: 100%;
            max-width: 900px;
            z-index: 10;
        }

        .letter-card {
            width: 65px;
            height: 85px;
            border-radius: var(--card-radius);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: 900;
            color: #FFF;
            cursor: grab;
            user-select: none;
            touch-action: none;
            position: relative;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .c1 {
            background: linear-gradient(135deg, #FF007A, #81007F);
        }

        .c2 {
            background: linear-gradient(135deg, #00D2FF, #3A7BD5);
        }

        .c3 {
            background: linear-gradient(135deg, #00FF87, #60EFFF);
        }

        .c4 {
            background: linear-gradient(135deg, #F2994A, #F2C94C);
        }

        .c5 {
            background: linear-gradient(135deg, #7000FF, #D300C5);
        }

        .dragging {
            opacity: 1;
            transform: scale(1.2);
            pointer-events: none;
            position: fixed;
            z-index: 1000;
            animation: energy-pulse 0.2s infinite;
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.6);
            border: 3px solid #fff;
        }

        @keyframes energy-pulse {
            0% {
                transform: scale(1.2) rotate(-8deg) skew(5deg);
            }

            50% {
                transform: scale(1.4) rotate(0deg) skew(-5deg);
            }

            100% {
                transform: scale(1.2) rotate(8deg) skew(5deg);
            }
        }

        #victory-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            backdrop-filter: blur(20px);
        }

        .action-container {
            display: flex;
            gap: 20px;
            margin-top: 30px;
            z-index: 10;
        }

        #next-btn,
        #replay-btn {
            display: none;
            padding: 12px 40px;
            font-size: 1.3rem;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Exo 2';
            font-weight: 900;
            text-transform: uppercase;
        }

        #next-btn {
            background: linear-gradient(90deg, #00f2ff, #ff007f);
        }

        #replay-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid #fff;
        }

        .footer-credit {
            margin-top: auto;
            padding-bottom: 10px;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.5);
            z-index: 10;
        }
    </style>
</head>

            currentGradientIndex = (currentGradientIndex + 1) % pastelGradients.length;

            // Hiện lớp transition lên với màu mới
            bgTransition.style.background = nextGradient;
            bgTransition.style.opacity = 1;

                // Sau khi transition hiện xong (3s), gán màu đó cho static và ẩn transition đi để chuẩn bị cho lần sau
                bgStatic.style.background = nextGradient;
                bgTransition.style.opacity = 0;

            (x, y) => { // 2. Fire
                for (let i = 0; i < 10; i++) {
                    ctx.beginPath(); ctx.fillStyle = `rgba(255, ${Math.random() * 100}, 0, 0.6)`;
                    ctx.arc(x + (Math.random() - 0.5) * 60, y + (Math.random() - 0.5) * 60 - (Date.now() % 100), Math.random() * 15, 0, Math.PI * 2);
                    ctx.fill();
                }
            },
            (x, y) => { // 3. Stars
                for (let i = 0; i < 15; i++) { ctx.fillStyle = "#fff"; ctx.fillRect(x + (Math.random() - 0.5) * 100, y + (Math.random() - 0.5) * 100, 3, 3); }
            },
            (x, y) => { // 4. Pulse
                ctx.beginPath(); ctx.strokeStyle = "#ff007f"; ctx.lineWidth = 3;
                ctx.arc(x, y, (Date.now() / 5) % 100, 0, Math.PI * 2); ctx.stroke();
            },
            (x, y) => { // 5. Matrix
                ctx.fillStyle = "#0f0"; ctx.font = "20px monospace";
                ctx.fillText(Math.floor(Math.random() * 9), x + (Math.random() - 0.5) * 80, y + (Math.random() - 0.5) * 80);
            },
            (x, y) => { // 6. Snow
                for (let i = 0; i < 8; i++) { ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(x + (Math.random() - 0.5) * 100, y + (Math.random() - 0.5) * 100, 4, 0, Math.PI * 2); ctx.fill(); }
            },
            (x, y) => { // 7. Bubbles
                for (let i = 0; i < 5; i++) { ctx.beginPath(); ctx.strokeStyle = "rgba(255,255,255,0.5)"; ctx.arc(x + (Math.random() - 0.5) * 120, y + (Math.random() - 0.5) * 120, Math.random() * 10, 0, Math.PI * 2); ctx.stroke(); }
            },
            (x, y) => { // 8. Petals
                ctx.fillStyle = "#ffb7c5"; for (let i = 0; i < 6; i++) ctx.fillRect(x + (Math.random() - 0.5) * 90, y + (Math.random() - 0.5) * 90, 8, 4);
            },
            (x, y) => { // 9. Glow
                let grad = ctx.createRadialGradient(x, y, 0, x, y, 60); grad.addColorStop(0, "rgba(255, 255, 255, 0.4)"); grad.addColorStop(1, "transparent");
                ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(x, y, 70, 0, Math.PI * 2); ctx.fill();
            },
            (x, y) => { // 10. Vortex
                ctx.strokeStyle = "#ffffff"; ctx.lineWidth = 2; ctx.beginPath();
                for (let i = 0; i < 10; i++) ctx.arc(x, y, i * 8, (Date.now() / 100), (Date.now() / 100) + 2);
                ctx.stroke();
            }
        ];

        function runEffectLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (activeCard) effects[currentEffectId](mousePos.x, mousePos.y);
            requestAnimationFrame(runEffectLoop);
        }
        runEffectLoop();

        function initBackgroundAnim() {
            const container = document.getElementById('bg-animation-container');
            const icons = ['🪐', '🌟', '🛸', '🦁', '🍎', '🚀', '🌍', '🍓'];
            setInterval(() => {
                const count = Math.floor(Math.random() * 2) + 2;
                for (let i = 0; i < count; i++) {
                    setTimeout(() => {
                        const obj = document.createElement('div'); obj.className = 'bg-object';
                        obj.textContent = icons[Math.floor(Math.random() * icons.length)];
                        obj.style.left = Math.random() * window.innerWidth + 'px';
                        obj.style.top = Math.random() * window.innerHeight + 'px';
                        obj.style.setProperty('--move-x', (Math.random() - 0.5) * 600 + 'px');
                        obj.style.setProperty('--move-y', (Math.random() - 0.5) * 600 + 'px');
                        container.appendChild(obj); setTimeout(() => obj.remove(), 20000);
                    }, i * 500);
                }
            }, 5000);
        }

        const sfx = {
            drag: new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3'),
            pop: new Audio('https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3'),
            win: new Audio('https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3')
        };

        function speakLetter(letter, index, isDragging = false) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(letter);
            u.lang = 'en-US';

            // Nếu allVoices chưa kịp nạp, ta bắt nó nạp lại ngay lập tức
            if (allVoices.length === 0) {
                allVoices = window.speechSynthesis.getVoices().filter(v => v.lang.includes('en'));
            }

            if (allVoices.length > 0) {
                u.voice = allVoices[index % allVoices.length];
            }

            if (isDragging) {
                u.rate = 1.7;
                u.pitch = 1.1 + (Math.random() * 0.4);
            } else {
                u.rate = 0.8;
                u.pitch = 1;
            }
            window.speechSynthesis.speak(u);
        }

        function startLoopingSpeech(letter, index) {
            stopLoopingSpeech();
            speakLetter(letter, index, true);
            // Nhịp điệu kêu la dồn dập
            speechInterval = setInterval(() => {
                if (activeCard) speakLetter(letter, index, true);
            }, 350);
        }

        function stopLoopingSpeech() {
            clearInterval(speechInterval);
        }

        function speakWord(word) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(word); u.lang = 'en-US'; u.rate = 0.6;
            window.speechSynthesis.speak(u);
        }

        function initGame() {
            document.getElementById('victory-overlay').style.display = 'none';

            // --- DÒNG QUAN TRỌNG NHẤT: Chọn ngẫu nhiên index từ 0 đến (số lượng từ - 1) ---
            currentWordIndex = Math.floor(Math.random() * wordsData.length);

            const data = wordsData[currentWordIndex];
            const container = document.getElementById('word-container');
            const pool = document.getElementById('letter-pool');

            container.innerHTML = '';
            pool.innerHTML = '';

            document.getElementById('next-btn').style.display = 'none';
            document.getElementById('replay-btn').style.display = 'none';
            document.getElementById('word-meaning').textContent = `Nghĩa: ${data.meaning}`;

            [...data.word].forEach(char => {
                const slot = document.createElement('div');
                slot.className = 'letter-slot';
                slot.dataset.char = char;
                slot.textContent = char;
                container.appendChild(slot);
            });

            const shuffled = [...data.word].map((char, i) => ({ char, i })).sort(() => Math.random() - 0.5);
            shuffled.forEach((item, i) => {
                const card = document.createElement('div');
                card.className = `letter-card c${(i % 5) + 1}`;
                card.textContent = item.char;
                card.dataset.voiceIndex = item.i;
                card.addEventListener('pointerdown', onStart);
                pool.appendChild(card);
            });
        }

        function onStart(e) {
            activeCard = e.currentTarget;
            currentEffectId = Math.floor(Math.random() * effects.length);
            const rect = activeCard.getBoundingClientRect();
            offset = { x: e.clientX - rect.left, y: e.clientY - rect.top };
            mousePos = { x: e.clientX, y: e.clientY };
            activeCard.classList.add('dragging');
            startLoopingSpeech(activeCard.textContent, parseInt(activeCard.dataset.voiceIndex));
            sfx.drag.play();
            document.addEventListener('pointermove', onMove); document.addEventListener('pointerup', onEnd);
        }

        function onMove(e) {
            if (!activeCard) return;

            // Đây là linh hồn của Endless Alphabet: 
            // Chữ cái sẽ rung lắc ngẫu nhiên 5px tạo cảm giác nó đang sống
            let rx = (Math.random() - 0.5) * 12;
            let ry = (Math.random() - 0.5) * 12;

            activeCard.style.left = (e.clientX - offset.x + rx) + 'px';
            activeCard.style.top = (e.clientY - offset.y + ry) + 'px';
            mousePos = { x: e.clientX, y: e.clientY };
        }

        function onEnd(e) {
            if (!activeCard) return;
            stopLoopingSpeech();
            const slots = document.querySelectorAll('.letter-slot');
            let matched = false;
            const vIdx = parseInt(activeCard.dataset.voiceIndex);

            slots.forEach(slot => {
                const rect = slot.getBoundingClientRect();
                if (e.clientX > rect.left && e.clientX < rect.right && e.clientY > rect.top && e.clientY < rect.bottom) {
                    if (slot.dataset.char === activeCard.textContent && !slot.classList.contains('filled')) {
                        slot.innerHTML = ''; slot.appendChild(activeCard); slot.classList.add('filled');
                        activeCard.classList.remove('dragging'); activeCard.classList.add('correct-pop');
                        activeCard.style = ""; sfx.pop.play();
                        speakLetter(activeCard.textContent, vIdx, false);
                        matched = true; checkWin();
                    }
                }
            });
            if (!matched) { activeCard.classList.remove('dragging'); activeCard.style = ""; }
            activeCard = null;
            document.removeEventListener('pointermove', onMove); document.removeEventListener('pointerup', onEnd);
        }

        function checkWin() {
            if (document.querySelectorAll('.letter-slot.filled').length === wordsData[currentWordIndex].word.length) {
                const w = wordsData[currentWordIndex].word;
                lastCompletedWord = w;

                sfx.win.play();
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });

                document.getElementById('victory-word').textContent = w;
                document.getElementById('victory-overlay').style.display = 'flex';

                setTimeout(() => speakWord(w), 500);

                setTimeout(() => {
                    document.getElementById('victory-overlay').style.display = 'none';
                    document.getElementById('next-btn').style.display = 'block';
                    document.getElementById('replay-btn').style.display = 'block';

                    // ĐÃ XÓA DÒNG currentWordIndex = (currentWordIndex + 1)... 
                    // Vì hàm initGame() khi được gọi sẽ tự bốc số ngẫu nhiên mới rồi.
                }, 2500);
            }
        }

        function repeatWord() { if (lastCompletedWord) speakWord(lastCompletedWord); }
        initBackgroundAnim(); initGame();
    </script>
</body>
